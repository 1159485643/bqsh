            });

            if (protectedCount || confirmedCount) {
                feishuLastSyncText = `动态同步：保护本地 ${protectedCount} 条 / 确认 ${confirmedCount} 条`;
            }

            if (changed || protectedCount || confirmedCount) {
                filteredRecords = null;
                lastFiltersCache = '';
                populateFilters();
                render(true);
            }

            return changed;
        }

        async function syncFeishuData() {
            const existingConfig = readFeishuConfig();
            if (isLocalFileMode() && records.length && (!existingConfig.appId || !existingConfig.appSecret || !existingConfig.feishuUrl)) {
                showToast('线下模式下复审进度已实时保存，无需手动同步');
                updateTopSyncStatus('无需同步');
                return;
            }

            setDataSourceMode('feishu');
            const config = saveDataSourceSettings();
            if (!config.appId || !config.appSecret) {
                alert('请先在数据源设置里填写 App ID 和 App Secret');
                return;
            }
            if (!config.feishuUrl) {
                alert('请先在数据源设置里填写飞书链接');
                return;
            }

            if (reviewWriteQueue && reviewWriteQueue.size) {
                await flushReviewWriteQueue(false);
            }

            showLoading('正在准备同步基础数据...', '0%');
            try {
                localStorage.removeItem(STORAGE_KEY);
                records = [];
                recordMap.clear();
                filteredRecords = null;
                lastFiltersCache = '';
                setRecords([], false, true);
                setText('source-label', '数据源：飞书 / 正在流式加载基础数据');

                const rows = await readFeishuAllPages(true, { stream: true });
                setText('source-label', `数据源：飞书 / 基础数据 / ${rows.length} 条`);
                feishuLastSyncText = `基础数据加载完成 ${rows.length} 条 ${formatClockTime(Date.now())}`;
                updateTopSyncStatus();

        function scheduleNextSilentSync(delay) {
            if (isLocalFileMode()) {
                stopFeishuSilentSyncForLocalMode();
                return;
            }

            const safeDelay = Math.max(5000, Number(delay || FEISHU_SILENT_SYNC_INTERVAL));
            if (feishuSilentSyncTimer) clearTimeout(feishuSilentSyncTimer);
            feishuNextSilentSyncAt = Date.now() + safeDelay;
            updateTopSyncStatus();
            feishuSilentSyncTimer = setTimeout(() => {
                silentSyncFeishuData().catch(error => {
                    feishuSilentSyncRunning = false;
                    feishuLastSyncText = `动态同步异常 ${formatClockTime(Date.now())}`;
                    console.warn('后台动态同步异常', error);
                    scheduleNextSilentSync(Math.min(180000, FEISHU_SILENT_SYNC_INTERVAL + feishuSilentSyncBackoff));
                });
            }, safeDelay);
        }

        async function silentSyncFeishuData() {
            if (isLocalFileMode()) {
                stopFeishuSilentSyncForLocalMode();
                return;
            }

            const config = readFeishuConfig();

            if (!config.appId || !config.appSecret) {
                feishuLastSyncText = '未配置 App ID / Secret';
                scheduleNextSilentSync(FEISHU_SILENT_SYNC_INTERVAL);
                return;
            }

            if (!config.feishuUrl) {
                feishuLastSyncText = '未配置飞书链接';
                scheduleNextSilentSync(FEISHU_SILENT_SYNC_INTERVAL);
                return;
            }

            if (feishuSilentSyncRunning) {
                updateTopSyncStatus('上一轮仍在执行');
                return;
            }

            feishuSilentSyncRunning = true;
            feishuLastSilentSyncStartedAt = Date.now();
            feishuLastSyncText = '动态同步准备中';
            updateTopSyncStatus();

            let nextDelay = FEISHU_SILENT_SYNC_INTERVAL;

            try {
                if (reviewWriteRunning) {
                    feishuLastSyncText = '回写中，延后动态同步';
                    nextDelay = 10000;
                    return;
                }

                if (reviewWriteQueue && reviewWriteQueue.size) {
                    feishuLastSyncText = `先回写 ${reviewWriteQueue.size} 条`;
                    updateTopSyncStatus();
                    await withTimeout(flushReviewWriteQueue(false), 12000, '回写队列超时');
                }

                if (!records.length) {
                    feishuLastSyncText = '未加载基础数据，跳过动态同步';
                    nextDelay = FEISHU_SILENT_SYNC_INTERVAL;
                    return;
                }

                feishuLastSyncText = '动态同步中';
                updateTopSyncStatus();

                const result = await withTimeout(readFeishuDynamicPages(true), 45000, '动态同步超时');
                const changed = applyDynamicRows(result.rows);
                feishuSilentSyncBackoff = 0;
                feishuLastSyncText = `动态同步 ${result.rows.length} 行 / 变更 ${changed} 条 ${formatClockTime(Date.now())}`;
                nextDelay = changed ? 30000 : FEISHU_SILENT_SYNC_INTERVAL;
            } catch (error) {
                feishuSilentSyncBackoff = Math.min(120000, (feishuSilentSyncBackoff || 0) + 30000);
                nextDelay = FEISHU_SILENT_SYNC_INTERVAL + feishuSilentSyncBackoff;
                feishuLastSyncText = `动态同步失败，${Math.round(nextDelay / 1000)}s 后重试 ${formatClockTime(Date.now())}`;
                console.warn('后台动态同步失败', error);
            } finally {
                feishuSilentSyncRunning = false;
                scheduleNextSilentSync(nextDelay);
            }
        }

        function startFeishuSilentSync() {
            scheduleNextSilentSync(Math.min(10000, FEISHU_SILENT_SYNC_INTERVAL));
        }

        function getRemoteRowIndex(record) {
            if (!record) return 0;
            const raw = record.raw || {};
            const value = Number(record.remoteRowIndex || record.__rowIndex || raw.__rowIndex || raw.remoteRowIndex || raw.remote_row_index || 0);
            if (Number.isFinite(value) && value > 0) return value;
            if (Number.isFinite(record.rowIndex)) return Number(record.rowIndex) + 2;
            return 0;
        }

        async function claimFeishuTasks() {

                alert('请先在数据源设置里填写 App ID 和 App Secret');

        async function syncReviewToFeishu(record) {
            if (!record) return;
            if (isLocalFileMode()) return;

            const config = readFeishuConfig();
            if (!config.feishuUrl) return;
            if (!config.appId || !config.appSecret) {
                alert('写回飞书失败：请先在数据源设置里填写 App ID 和 App Secret');

        }

        function decodeHtml(value) {
            if (!value) return '';
            const text = String(value);
            if (text.indexOf('&') === -1) return text;
            return text
                .replace(/&lt;/g, '<')
                .replace(/&gt;/g, '>')
                .replace(/&amp;/g, '&')
                .replace(/&quot;/g, '"')
                .replace(/&#39;/g, "'");
        }

        function collectUrls(value, result = []) {
            if (value == null) return result;
            if (Array.isArray(value)) {
                value.forEach(item => collectUrls(item, result));
                return result;
            }
            if (typeof value === 'object') {
                ['url', 'href', 'link', 'text', 'value', 'image_url', 'imageUrl', 'src'].forEach(key => {
                    if (value[key] != null) collectUrls(value[key], result);
                });
                return result;
            }

            let text = decodeHtml(String(value || '').trim());
            if (!text) return result;
            text = text.replace(/\\\//g, '/');

            if (text[0] === '[' || text[0] === '{') {
                try {
                    collectUrls(JSON.parse(text), result);
                } catch (error) {}
            }

            const imageFormula = text.match(/IMAGE\s*\(\s*["']([^"']+)["']/i);
            if (imageFormula) result.push(imageFormula[1]);

            const matches = text.match(/https?:\/\/[^\s"'<>，；,;、)）\]}]+/g);
            if (matches) matches.forEach(url => result.push(url.trim()));
            return result;
        }

        function uniqueCleanUrls(urls) {
            const seen = new Set();
            return (urls || []).map(url => String(url || '').trim())
                .map(url => url.replace(/[，,;；。]+$/g, ''))
                .filter(url => /^https?:\/\//i.test(url))
                .filter(url => {
                    if (seen.has(url)) return false;
                    seen.add(url);
                    return true;
                });
        }

        function splitImageUrls(value) {
            return uniqueCleanUrls(collectUrls(value));
        }

        function firstUrl(value) {
            return splitImageUrls(value)[0] || '';
        }

        function firstPresent(row, fields) {
            for (let i = 0; i < fields.length; i++) {
                if (row[fields[i]] !== undefined) return row[fields[i]];
            }
            return '';
        }

        function normalizePreAuditScore(value) {
            const text = String(value == null ? '' : value).trim();
            if (!text) return -1;
            const score = Number(text);
            if (!Number.isFinite(score)) return -1;
            return Math.round(score);
        }

        function getAiScoreLevel(score) {
            const value = Number(score);
            if (!Number.isFinite(value) || value < 0) return '';
            if (value >= 81 && value <= 100) return 'high';
            if (value >= 31 && value <= 80) return 'medium';
            if (value >= 0 && value <= 30) return 'low';
            return '';
        }

        function aiScoreLevelText(level) {
            if (level === 'high') return '高';
            if (level === 'medium') return '中';
            if (level === 'low') return '低';
            return '';
        }

        function formatAiScore(record) {
            if (!record || record.preAuditScore === -1 || !record.aiScoreLevel) return '';
            return `评级：${aiScoreLevelText(record.aiScoreLevel)}\n评分：${record.preAuditScore}`;
        }

        function cleanSameStyleName(labelName) {
            return String(labelName || '').replace(/同款$/, '').trim();
        }

        const LABEL_APPLY_ID_FIELDS = ['label_applyId', 'label_apply_id', 'open_label_apply_id', 'openLabelApplyId', '标签审核ID', '标签审核主键'];
        const PRE_AUDIT_SCORE_FIELDS = ['pre_audit_score', 'AI预评分', 'AI预评分(pre_audit_score)', 'ai_pre_score', 'preAuditScore'];
        const IMAGE_FIELDS = ['送审图片', 'pics', 'reported_pic', 'image_urls', 'imageUrls', 'images', '图片', '主图', '商品图片'];
        const SPEC_FIRST_IMAGE_FIELDS = ['规格首图', 'spec_first_image', 'spec_first_images', 'specFirstImage', 'specFirstImages', 'cspu_img_urls', '规格图'];
        const REVIEW_STATUS_FIELDS = ['审核状态', '复审结果', '是否通过', '审核结果', 'review_status', 'reviewStatus', 'review_result', 'label', 'status'];
        const REVIEW_STATE_FIELDS = new Set([
            'review_status',
            'reviewStatus',
            'review_result',
            'review_reason',
            'review_time',
            'label',
            'label_remark',
            'label_time',
            '复审结果',
            '不通过原因',
            '复审时间',
        ]);

        function hash128(text) {
            let h1 = 1779033703;
            let h2 = 3144134277;
            let h3 = 1013904242;
            let h4 = 2773480762;
            for (let i = 0; i < text.length; i++) {
                const k = text.charCodeAt(i);
                h1 = h2 ^ Math.imul(h1 ^ k, 597399067);
                h2 = h3 ^ Math.imul(h2 ^ k, 2869860233);
                h3 = h4 ^ Math.imul(h3 ^ k, 951274213);
                h4 = h1 ^ Math.imul(h4 ^ k, 2716044179);
            }
            h1 = Math.imul(h3 ^ (h1 >>> 18), 597399067);
            h2 = Math.imul(h4 ^ (h2 >>> 22), 2869860233);
            h3 = Math.imul(h1 ^ (h3 >>> 17), 951274213);
            h4 = Math.imul(h2 ^ (h4 >>> 19), 2716044179);
            const parts = [
                (h1 ^ h2 ^ h3 ^ h4) >>> 0,
                (h2 ^ h1) >>> 0,
                (h3 ^ h1) >>> 0,
                (h4 ^ h1) >>> 0,
            ];
            return parts.map(part => part.toString(16).padStart(8, '0')).join('');
        }

        function createRowFingerprint(row) {
            const source = row || {};
            const payload = Object.keys(source)
                .filter(key => key && !REVIEW_STATE_FIELDS.has(key))
                .sort()
                .map(key => `${key}=${String(source[key] == null ? '' : source[key]).trim()}`)
                .join('\u001f');
            return hash128(payload);
        }

        function normalizeRecord(row, index) {
            const reviewStatus = firstPresent(row, REVIEW_STATUS_FIELDS);
            const preAuditScore = normalizePreAuditScore(firstPresent(row, PRE_AUDIT_SCORE_FIELDS));
            const specFirstImages = splitImageUrls(firstPresent(row, SPEC_FIRST_IMAGE_FIELDS));
            const labelApplyId = String(firstPresent(row, LABEL_APPLY_ID_FIELDS)).trim();
            const record = {
                raw: row,
                rowIndex: index,
                remoteRowIndex: Number(row.__rowIndex || row.remoteRowIndex || row.remote_row_index || 0),
                occurrenceIndex: index,
                rowFingerprint: createRowFingerprint(row),
                brandLevel: String(row.brand_level || row['品牌等级'] || '').trim(),
                spuId: String(row.spu_id || row['SPU ID'] || '').trim(),
                spuTitle: String(row.spu_title || row['商品标题'] || '').trim(),
                categoryLv1: String(row.category_lv1_name || row['一级类目'] || '').trim(),
                categoryLv2: String(row.category_lv2_name || row['二级类目'] || '').trim(),
                categoryLv3: String(row.category_lv3_name || row['三级类目'] || '').trim(),
                managementLv1: String(row.management_category_lv1_name || row['一级管理类目'] || '').trim(),
                managementLv2: String(row.management_category_lv2_name || '').trim(),
                managementLv3: String(row.management_category_lv3_name || '').trim(),
                brandName: String(row.brand_name || row['品牌'] || '').trim(),
                labelId: String(row.label_id || '').trim(),
                openLabelApplyId: labelApplyId,
                sameStyleLabel: String(row.label_name || row['明星同款'] || '').trim(),
                starName: cleanSameStyleName(row.label_name || row['明星同款'] || ''),
                applyType: String(row.apply_type || row['提报类型'] || '').trim(),
                imageUrls: splitImageUrls(firstPresent(row, IMAGE_FIELDS)),
                preAuditScore,
                aiScoreLevel: getAiScoreLevel(preAuditScore),
                specFirstImages: specFirstImages.length ? specFirstImages : splitImageUrls(row['规格图'] || row.sku_images || row.sku_pics || ''),
                communityLink: firstUrl(row['社区链接'] || row.community_link || row.communityLink || row['社区/站内链接'] || ''),
                externalLink: firstUrl(row['站外链接'] || row.dewu_app_link || row.external_link || row.externalLink || row['外网链接'] || row['商品链接'] || ''),
                healthLevel: String(row.health_level || row.health_score_level || row['健康分等级'] || '').trim(),
                skuImages: splitImageUrls(row.sku_images || row.sku_pics || row['SKU规格图'] || ''),
                reviewStatus: normalizeStatus(reviewStatus),
                reviewReason: String(row.review_reason || row.label_remark || row['审核备注'] || row['不通过原因'] || '').trim(),
                reviewTime: String(row.review_time || row.label_time || row['审核时间'] || row['复审时间'] || '').trim(),
                handlerName: String(row['处理人'] || row.handler || row.reviewer || row['审核人'] || '').trim(),
            };

            // Pre-calculate search text for lightning fast query filtering
            record._searchText = [
                record.spuId,
                record.spuTitle,
                record.brandName,
                record.sameStyleLabel,
                record.starName,
                record.categoryLv1,
                record.categoryLv2,
                record.categoryLv3,
                record.managementLv1,
                record.managementLv2,
                record.managementLv3,
                record.applyType,
                record.handlerName,
            ].join(' ').toLowerCase();

            return record;
        }

        const STATUS_APPROVED = new Set(['approved', 'approve', 'pass', 'passed', 'correct', 'true', 'yes', 'y', '1', '通过', '已通过', '审核通过', '复审通过', '是']);
        const STATUS_REJECTED = new Set(['rejected', 'reject', 'fail', 'failed', 'incorrect', 'false', 'no', 'n', '0', '不通过', '未通过', '已不通过', '审核不通过', '复审不通过', '否', '驳回', '拒绝']);

        function normalizeStatus(value) {
            let text = String(value || '').trim();
            if (!text) return '';
            const compact = text.replace(/\s+/g, '').replace(/：/g, ':');
            const lower = compact.toLowerCase();
            if (STATUS_APPROVED.has(compact) || STATUS_APPROVED.has(lower)) return 'approved';
            if (STATUS_REJECTED.has(compact) || STATUS_REJECTED.has(lower)) return 'rejected';
            if (/不通过|未通过|拒绝|驳回|reject|fail/i.test(compact)) return 'rejected';
            if (/通过|approved|approve|pass|correct/i.test(compact)) return 'approved';
            return '';
        }

        function buildRecordKey(record) {
            if (record._key) return record._key;
            const labelApplyId = String(record.openLabelApplyId || 'no-apply').trim() || 'no-apply';
            const fingerprint = record.rowFingerprint || createRowFingerprint(record.raw || record);
            const occurrence = Number.isInteger(record.occurrenceIndex) ? record.occurrenceIndex : record.rowIndex;
            return `row__${labelApplyId}__${fingerprint}__${occurrence}`;
        }

        function getSearchText(record) {
            return [
                record.spuId,
                record.spuTitle,
                record.brandName,
                record.sameStyleLabel,
                record.starName,
                record.categoryLv1,
                record.categoryLv2,
                record.categoryLv3,
                record.managementLv1,
                record.managementLv2,
                record.managementLv3,
                record.applyType,
                record.handlerName,
            ].join(' ').toLowerCase();
        }

        function filterRecords(source, filters) {
            const query = String(filters.query || '').trim().toLowerCase();
            return source.filter(record => {
                if (filters.categoryLv1 && record.categoryLv1 !== filters.categoryLv1) return false;
                if (filters.categoryLv2 && record.categoryLv2 !== filters.categoryLv2) return false;
                if (filters.categoryLv3 && record.categoryLv3 !== filters.categoryLv3) return false;
                if (filters.managementLv1 && record.managementLv1 !== filters.managementLv1) return false;
                if (filters.managementLv2 && record.managementLv2 !== filters.managementLv2) return false;
                if (filters.managementLv3 && record.managementLv3 !== filters.managementLv3) return false;
                if (filters.brandLevel && record.brandLevel !== filters.brandLevel) return false;
                if (filters.brandName && record.brandName !== filters.brandName) return false;
                if (filters.handlerName && record.handlerName !== filters.handlerName) return false;
                if (filters.aiScoreLevel && record.aiScoreLevel !== filters.aiScoreLevel) return false;
                if (filters.status === 'pending' && record.reviewStatus) return false;
                if (filters.status === 'approved' && record.reviewStatus !== 'approved') return false;
                if (filters.status === 'rejected' && record.reviewStatus !== 'rejected') return false;
                if (query && !record._searchText.includes(query)) return false;
                return true;
            });
        }

        function hasActiveFilters(filters) {
            return Object.keys(filters).some(key => String(filters[key] || '').trim());
        }

        function summarizeRecords(source) {
            let approved = 0;
            let rejected = 0;
            for (const row of source) {
                if (row.reviewStatus === 'approved') approved++;
                else if (row.reviewStatus === 'rejected') rejected++;
            }
            const total = source.length;
            const pending = total - approved - rejected;
            const progress = total ? ((approved + rejected) / total) * 100 : 0;
            return {
                total,
                approved,
                rejected,
                pending,
                progressText: `${progress.toFixed(1)}%`,
            };
        }

        function paginateRecords(source, options) {
            const pageSize = Math.max(1, Number(options.pageSize) || 100);
            const maxPage = Math.max(0, Math.ceil(source.length / pageSize) - 1);
            const page = Math.min(Math.max(0, Number(options.page) || 0), maxPage);
            const start = page * pageSize;
            return {
                page,
                pageSize,
                totalPages: maxPage + 1,
                rows: source.slice(start, start + pageSize),
            };
        }

        function escapeCsvCell(value) {
            const text = String(value == null ? '' : value);
            return `"${text.replace(/"/g, '""')}"`;
        }

        function statusText(status) {
            if (status === 'approved') return '通过';
            if (status === 'rejected') return '不通过';
            return '未复审';
        }

        function getAvailableActions(record) {
            return ['approve', 'reject'];
        }

        const REJECT_REASON_PRESETS = [
            '人物不一致',
            '商品不一致',
            '商品/品牌无法辨认',
            '疑似P图',
            '套装未全部上身/手持',
        ];

        function renderRejectReasonPresets(className = '') {
            const classes = `reason-preset-list${className ? ' ' + className : ''}`;
            return `<div class="${classes}" aria-label="常用不通过原因">${REJECT_REASON_PRESETS.map(reason => (
                `<button class="reason-preset-btn" type="button" data-reject-reason-preset="${htmlEscape(reason)}">${htmlEscape(reason)}</button>`
            )).join('')}</div>`;
        }

        function renderActionButtons(record, key) {
            return getAvailableActions(record).map(action => {
                if (action === 'approve') {
                    const activeClass = record.reviewStatus === 'approved' ? ' active' : '';
                    return `<button class="btn approve${activeClass}" type="button" data-approve="${htmlEscape(key)}">审核通过</button>`;
                }
                const activeClass = record.reviewStatus === 'rejected' ? ' active' : '';
                return `<button class="btn reject${activeClass}" type="button" data-reject="${htmlEscape(key)}">审核不通过</button>`;
            }).join('');
        }

        function syncStickyOffsets() {
            const reviewSticky = document.querySelector('.review-sticky');
            if (!reviewSticky) return;
            const stickyTop = Number.parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--review-sticky-top')) || 68;
            const stickyHeight = reviewSticky.offsetHeight;
            const tableHeadTop = stickyTop + stickyHeight;
            document.documentElement.style.setProperty('--review-sticky-height', `${stickyHeight}px`);
            document.documentElement.style.setProperty('--table-head-top', `${tableHeadTop}px`);
        }

        function htmlEscape(value) {
            return String(value == null ? '' : value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function cssEscape(value) {
            if (window.CSS && typeof window.CSS.escape === 'function') return window.CSS.escape(String(value));
            return String(value).replace(/["\\]/g, '\\$&');
        }

        function scanLines(text, onLine) {
            let start = 0;
            const len = text.length;
            let lineIndex = 0;
            while (start < len) {
                let end = text.indexOf('\n', start);
                if (end === -1) end = len;
                let line = text.slice(start, end);
                if (line.endsWith('\r')) {
                    line = line.slice(0, -1);
                }
                onLine(line, lineIndex++);
                start = end + 1;
            }
        }

        function parseNdjson(text) {
            const parsed = [];
            const errors = [];
            scanLines(text, (line, index) => {
                const trimmed = line.trim();
                if (!trimmed) return;
                try {
                    parsed.push(JSON.parse(trimmed));
                } catch (error) {
                    errors.push({ line: index + 1, message: error.message });
                }
            });
            return { records: parsed, errors };
        }

        function unescapeTsvCell(value) {
            if (!value) return '';
            let text = String(value);
            if (text.indexOf('\\') !== -1) {
                text = text
                    .replace(/\\n/g, '\n')
                    .replace(/\\r/g, '\r')
                    .replace(/\\t/g, '\t')
                    .replace(/\\\\/g, '\\');
            }
            return decodeHtml(text);
        }

        function parseTsv(text) {
            const records = [];
            let headers = null;
            scanLines(text, (line) => {
                if (line.length === 0) return;
                const values = line.split('\t').map(unescapeTsvCell);
                if (!headers) {
                    headers = values;
                } else {
                    const item = {};
                    for (let i = 0; i < headers.length; i++) {
                        const header = headers[i];
                        if (header) {
                            item[header] = values[i] || '';
                        }
                    }
                    records.push(item);
                }
            });
            return { records, errors: [] };
        }

        function parseCsv(text) {
            const records = [];
            let headers = null;
            let row = [];
            let inQuotes = false;
            let cell = '';

            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                const nextChar = text[i + 1];

                if (inQuotes) {
                    if (char === '"') {
                        if (nextChar === '"') {
                            cell += '"';
                            i++;
                        } else {
                            inQuotes = false;
                        }
                    } else {
                        cell += char;
                    }
                } else {
                    if (char === '"') {
                        inQuotes = true;
                    } else if (char === ',') {
                        row.push(cell);
                        cell = '';
                    } else if (char === '\n' || char === '\r') {
                        if (char === '\r' && nextChar === '\n') {
                            i++;
                        }
                        row.push(cell);
                        cell = '';
                        if (row.some(Boolean) || row.length > 1) {
                            if (!headers) {
                                headers = row.map(h => h.trim());
                            } else {
                                const item = {};
                                headers.forEach((header, index) => {
                                    if (header) item[header] = row[index] || '';
                                });
                                records.push(item);
                            }
                        }
                        row = [];
                    } else {
                        cell += char;
                    }
                }
            }

            if (cell || row.length > 0) {
                row.push(cell);
                if (row.some(Boolean) || row.length > 1) {
                    if (headers) {
                        const item = {};
                        headers.forEach((header, index) => {
                            if (header) item[header] = row[index] || '';
                        });
                        records.push(item);
                    }
                }
            }

            return { records, errors: [] };
        }

        function parseXmlSpreadsheet(xml) {
            const records = [];
            let headers = null;
            const rowRegex = /<Row[^>]*>([\s\S]*?)<\/Row>/gi;
            let match;
            while ((match = rowRegex.exec(xml))) {
                const rowXml = match[1];
                const cells = [];
                const cellRegex = /<Data[^>]*>([\s\S]*?)<\/Data>/gi;
                let cellMatch;
                while ((cellMatch = cellRegex.exec(rowXml))) {
                    const decoded = cellMatch[1]
                        .replace(/&amp;/g, '&')
                        .replace(/&lt;/g, '<')
                        .replace(/&gt;/g, '>')
                        .replace(/&quot;/g, '"')
                        .replace(/&#39;/g, "'");
                    cells.push(decoded);
                }
                
                if (!cells.some(Boolean)) continue;
                
                if (!headers) {
                    headers = cells.map(h => h.trim());
                } else {
                    const item = {};
                    headers.forEach((header, index) => {
                        if (header) item[header] = cells[index] || '';
                    });
                    records.push(item);
                }
            }
            return { records, errors: [] };
        }

        function parseReviewData(text) {
            const trimmed = String(text || '').trim();
            if (!trimmed) return { records: [], errors: [] };
            if (trimmed[0] === '[') {
                try {
                    const parsed = JSON.parse(trimmed);
                    return Array.isArray(parsed) ? { records: parsed, errors: [] } : { records: [], errors: [{ line: 1, message: 'JSON root must be an array' }] };
                } catch (error) {
                    return parseNdjson(trimmed);
                }
            }
            if (trimmed[0] === '{') {
                return parseNdjson(trimmed);
            }
            if (trimmed.startsWith('<?xml') || trimmed.startsWith('<Workbook') || /<Workbook[\s>]/i.test(trimmed)) {
                return parseXmlSpreadsheet(trimmed);
            }
            if (/<table[\s>]/i.test(trimmed)) {
                return parseHtmlTable(trimmed);
            }
            // Detect CSV vs TSV
            const firstLine = trimmed.split('\n')[0];
            const tabCount = (firstLine.match(/\t/g) || []).length;
            const commaCount = (firstLine.match(/,/g) || []).length;

            if (commaCount > tabCount) {
                return parseCsv(trimmed);
            }
            return parseTsv(trimmed);
        }

        function readProgress() {
            try {
                return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
            } catch (error) {
                return {};
            }
        }

        function saveProgress(singleRecord = null) {
            const progress = readProgress();
            
            const updateRecord = (record) => {
                if (!record.reviewStatus) return;
                const progressData = {
                    reviewStatus: record.reviewStatus,
                    reviewReason: record.reviewReason,
                    reviewTime: record.reviewTime,
                };
                progress[buildRecordKey(record)] = progressData;
            };

            if (singleRecord) {
                updateRecord(singleRecord);
            } else {
                records.forEach(updateRecord);
            }
            
            localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
        }

        function applyProgress() {
            const progress = readProgress();
            records.forEach(record => {
                const saved = progress[buildRecordKey(record)];
                if (!saved) return;
                record.reviewStatus = normalizeStatus(saved.reviewStatus);
                record.reviewReason = String(saved.reviewReason || '');
                record.reviewTime = String(saved.reviewTime || '');
            });
        }

        function nowText() {
            const d = new Date();
            const pad = n => String(n).padStart(2, '0');
            return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
        }

        function mergeAndDeduplicate(existingRecords, newRows, alreadyNormalized = false) {
            const existing = existingRecords.map((record, index) => {
                record.rowIndex = index;
                return record;
            });
            const offset = existing.length;
            const incoming = newRows.map((row, index) => {
                const record = alreadyNormalized ? row : normalizeRecord(row, offset + index);
                record.rowIndex = offset + index;
                return record;
            });
            const result = existing.concat(incoming);
            const occurrenceCounts = new Map();
            result.forEach((record, index) => {
                record.rowIndex = index;
                if (!record.rowFingerprint) {
                    record.rowFingerprint = createRowFingerprint(record.raw || record);
                }
                if (!record.remoteRowIndex && record.raw && record.raw.__rowIndex) {
                    record.remoteRowIndex = Number(record.raw.__rowIndex || 0);
                }
                const occurrenceKey = `${record.openLabelApplyId || ''}__${record.rowFingerprint}`;
                const occurrenceIndex = occurrenceCounts.get(occurrenceKey) || 0;
                record.occurrenceIndex = occurrenceIndex;
                occurrenceCounts.set(occurrenceKey, occurrenceIndex + 1);
                
                const labelApplyId = String(record.openLabelApplyId || 'no-apply').trim() || 'no-apply';
                record._key = `row__${labelApplyId}__${record.rowFingerprint}__${occurrenceIndex}`;
            });
            return result;
        }

        let categoryCascade = new Map();
        let managementCascade = new Map();

        function setRecords(rows, append = false, alreadyNormalized = false) {
            categoryCascade.clear();
            managementCascade.clear();
            let allCategoryLv2Set = new Set();
            let allCategoryLv3Set = new Set();
            let allManagementLv2Set = new Set();
            let allManagementLv3Set = new Set();
            let brandLevelSet = new Set();
            let brandNameSet = new Set();
            let handlerNameSet = new Set();

            const keepPage = append ? currentPage : 0;

            if (append) {
                records = mergeAndDeduplicate(records, rows, alreadyNormalized);
            } else {
                records = mergeAndDeduplicate([], rows, alreadyNormalized);
            }

            applyProgress();
            applyPendingReviewOverlay(records);

            recordMap.clear();
            records.forEach(record => {
                recordMap.set(record._key, record);
                
                let cLv1 = record.categoryLv1 || '';
                let cLv2 = record.categoryLv2 || '';
                let cLv3 = record.categoryLv3 || '';
                if (cLv1 || cLv2 || cLv3) {
                    if (!categoryCascade.has(cLv1)) categoryCascade.set(cLv1, new Map());
                    let lv2Map = categoryCascade.get(cLv1);
                    if (!lv2Map.has(cLv2)) lv2Map.set(cLv2, new Set());
                    if (cLv3) {
                        lv2Map.get(cLv2).add(cLv3);
                    }
                }
                if (cLv2) allCategoryLv2Set.add(cLv2);
                if (cLv3) allCategoryLv3Set.add(cLv3);

                let mLv1 = record.managementLv1 || '';
                let mLv2 = record.managementLv2 || '';
                let mLv3 = record.managementLv3 || '';
                if (mLv1 || mLv2 || mLv3) {
                    if (!managementCascade.has(mLv1)) managementCascade.set(mLv1, new Map());
                    let mlv2Map = managementCascade.get(mLv1);
                    if (!mlv2Map.has(mLv2)) mlv2Map.set(mLv2, new Set());
                    if (mLv3) {
                        mlv2Map.get(mLv2).add(mLv3);
                    }
                }
                if (mLv2) allManagementLv2Set.add(mLv2);
                if (mLv3) allManagementLv3Set.add(mLv3);

                if (record.brandLevel) brandLevelSet.add(record.brandLevel);
                if (record.brandName) brandNameSet.add(record.brandName);
                if (record.handlerName) handlerNameSet.add(record.handlerName);
            });
            const sortZh = (arr) => arr.sort((a, b) => a.localeCompare(b, 'zh-Hans-CN'));
            precomputedFilterOptions = {
                categoryLv1: sortZh(Array.from(categoryCascade.keys())),
                categoryLv2: sortZh(Array.from(allCategoryLv2Set)),
                categoryLv3: sortZh(Array.from(allCategoryLv3Set)),
                managementLv1: sortZh(Array.from(managementCascade.keys())),
                managementLv2: sortZh(Array.from(allManagementLv2Set)),
                managementLv3: sortZh(Array.from(allManagementLv3Set)),
                brandLevel: sortZh(Array.from(brandLevelSet)),
                brandName: sortZh(Array.from(brandNameSet)),
                handlerName: sortZh(Array.from(handlerNameSet)),
            };

            currentPage = keepPage;
            filteredRecords = null;
            lastFiltersCache = '';
            populateFilters();
            render();
        }

        function appendRecords(newRows) {
            setRecords(newRows, true);
        }

        function getFilters() {
            const read = id => {
                const el = document.getElementById(id);
                return el ? el.value : '';
            };
            return {
                categoryLv1: read('filter-category-lv1'),
                categoryLv2: read('filter-category-lv2'),
                categoryLv3: read('filter-category-lv3'),
                managementLv1: read('filter-management-lv1'),
                managementLv2: read('filter-management-lv2'),
                managementLv3: read('filter-management-lv3'),
                brandLevel: read('filter-brand-level'),
                brandName: read('filter-brand-name'),
                handlerName: read('filter-handler-name'),
                aiScoreLevel: read('filter-ai-score-level'),
                status: read('filter-review-status'),
                query: read('filter-query'),
            };
        }

        function uniqueValues(field) {
            return Array.from(new Set(records.map(row => row[field]).filter(Boolean))).sort((a, b) => a.localeCompare(b, 'zh-Hans-CN'));
        }

        function uniqueValuesFrom(source, field) {
            return Array.from(new Set(source.map(row => row[field]).filter(Boolean))).sort((a, b) => a.localeCompare(b, 'zh-Hans-CN'));
        }

        function getCascadeOptions(cascade, lv1Value, lv2Value, precomputedLv2, precomputedLv3) {
            let validLv2s = new Set();
            let validLv3s = new Set();

            if (lv1Value) {
                const lv2Map = cascade.get(lv1Value);
                if (lv2Map) {
                    validLv2s = new Set(lv2Map.keys());
                    if (lv2Value && lv2Map.has(lv2Value)) {
                        lv2Map.get(lv2Value).forEach(v => validLv3s.add(v));
                    }
                }
            }

            return {
                lv2: Array.from(validLv2s).sort((a, b) => a.localeCompare(b, 'zh-Hans-CN')),
                lv3: Array.from(validLv3s).sort((a, b) => a.localeCompare(b, 'zh-Hans-CN'))
            };
        }

        function getFilterOptions(source, filters) {
            if (source === records && precomputedFilterOptions) {
                let catLv2 = [];
                let catLv3 = [];
                let mgmtLv2 = [];
                let mgmtLv3 = [];

                if (filters && filters.categoryLv1) {
                    const catOpts = getCascadeOptions(categoryCascade, filters.categoryLv1, filters.categoryLv2, [], []);
                    catLv2 = catOpts.lv2;
                    catLv3 = catOpts.lv3;
                }

                if (filters && filters.managementLv1) {
                    const mgmtOpts = getCascadeOptions(managementCascade, filters.managementLv1, filters.managementLv2, [], []);
                    mgmtLv2 = mgmtOpts.lv2;
                    mgmtLv3 = mgmtOpts.lv3;
                }

                return {
                    categoryLv1: precomputedFilterOptions.categoryLv1,
                    categoryLv2: catLv2,
                    categoryLv3: catLv3,
                    managementLv1: precomputedFilterOptions.managementLv1,
                    managementLv2: mgmtLv2,
                    managementLv3: mgmtLv3,
                    brandLevel: precomputedFilterOptions.brandLevel,
                    brandName: precomputedFilterOptions.brandName,
                    handlerName: precomputedFilterOptions.handlerName || [],
                };
            }
            
            // Fallback for non-records sources
            let scopedRecords = source;
            let scopedMgmtRecords = source;
            if (filters) {
                if (filters.categoryLv1) scopedRecords = scopedRecords.filter(row => row.categoryLv1 === filters.categoryLv1);
                if (filters.categoryLv2) scopedRecords = scopedRecords.filter(row => row.categoryLv2 === filters.categoryLv2);
                if (filters.managementLv1) scopedMgmtRecords = scopedMgmtRecords.filter(row => row.managementLv1 === filters.managementLv1);
                if (filters.managementLv2) scopedMgmtRecords = scopedMgmtRecords.filter(row => row.managementLv2 === filters.managementLv2);
            }

            return {
                categoryLv1: uniqueValuesFrom(source, 'categoryLv1'),
                categoryLv2: filters && filters.categoryLv1 ? uniqueValuesFrom(source.filter(row => row.categoryLv1 === filters.categoryLv1), 'categoryLv2') : [],
                categoryLv3: filters && filters.categoryLv2 ? uniqueValuesFrom(scopedRecords.filter(row => row.categoryLv2 === filters.categoryLv2), 'categoryLv3') : [],
                managementLv1: uniqueValuesFrom(source, 'managementLv1'),
                managementLv2: filters && filters.managementLv1 ? uniqueValuesFrom(source.filter(row => row.managementLv1 === filters.managementLv1), 'managementLv2') : [],
                managementLv3: filters && filters.managementLv2 ? uniqueValuesFrom(scopedMgmtRecords.filter(row => row.managementLv2 === filters.managementLv2), 'managementLv3') : [],
                brandLevel: uniqueValuesFrom(source, 'brandLevel'),
                brandName: uniqueValuesFrom(source, 'brandName'),
                handlerName: uniqueValuesFrom(source, 'handlerName'),
            };
        }

        function fillSelect(id, values) {
            const el = document.getElementById(id);
            if (!el) return;
            const current = el.value;
            const validValues = values.filter(v => v !== '');
            el.innerHTML = '<option value="">全部</option>' + validValues.map(value => `<option value="${htmlEscape(value)}">${htmlEscape(value)}</option>`).join('');
            if (validValues.includes(current)) el.value = current;
        }

        function clearFilterValue(id) {
            const el = document.getElementById(id);
            if (!el) return false;
            el.value = '';
            if (id === 'filter-category-lv1') {
                const categoryLv2 = document.getElementById('filter-category-lv2');
                const categoryLv3 = document.getElementById('filter-category-lv3');
                if (categoryLv2) categoryLv2.value = '';
                if (categoryLv3) categoryLv3.value = '';
            } else if (id === 'filter-category-lv2') {
                const categoryLv3 = document.getElementById('filter-category-lv3');
                if (categoryLv3) categoryLv3.value = '';
            } else if (id === 'filter-management-lv1') {
                const managementLv2 = document.getElementById('filter-management-lv2');
                const managementLv3 = document.getElementById('filter-management-lv3');
                if (managementLv2) managementLv2.value = '';
                if (managementLv3) managementLv3.value = '';
            } else if (id === 'filter-management-lv2') {
                const managementLv3 = document.getElementById('filter-management-lv3');
                if (managementLv3) managementLv3.value = '';
            }
            return true;
        }

        function populateFilters() {
            const options = getFilterOptions(records, getFilters());
            fillSelect('filter-category-lv1', options.categoryLv1);
            fillSelect('filter-category-lv2', options.categoryLv2);
            fillSelect('filter-category-lv3', options.categoryLv3);
            fillSelect('filter-management-lv1', options.managementLv1);
            fillSelect('filter-management-lv2', options.managementLv2);
            fillSelect('filter-management-lv3', options.managementLv3);
            fillSelect('filter-brand-level', options.brandLevel);
            fillSelect('filter-brand-name', options.brandName);
            fillSelect('filter-handler-name', options.handlerName || []);
        }

        function renderSummary() {
            const summary = summarizeRecords(records);
            setText('metric-total', summary.total);
            setText('metric-approved', summary.approved);
            setText('metric-rejected', summary.rejected);
            setText('metric-pending', summary.pending);
            setText('metric-progress', summary.progressText);
        }

        function setText(id, value) {
            const el = document.getElementById(id);
            if (el) el.textContent = value;
        }

        let lastFiltersCache = '';

        function render(forceFilter = false) {
            renderSummary();
            syncStickyOffsets();
            
            const currentFilters = getFilters();
            const filterKey = JSON.stringify(currentFilters);
            
            if (forceFilter || filterKey !== lastFiltersCache || !filteredRecords) {
                filteredRecords = hasActiveFilters(currentFilters) ? filterRecords(records, currentFilters) : records;
                lastFiltersCache = filterKey;
            }
            
            const pageSizeEl = document.getElementById('page-size');
            const pageSize = pageSizeEl ? Number(pageSizeEl.value) : 10;
            const pageData = paginateRecords(filteredRecords, { page: currentPage, pageSize });
            currentPage = pageData.page;
            setText('page-info', `${filteredRecords.length} 条 · 第 ${pageData.page + 1} / ${pageData.totalPages} 页`);
            const tbody = document.getElementById('review-table-body');
            const empty = document.getElementById('empty-state');
            if (!tbody || !empty) return;
            empty.hidden = records.length > 0;
            tbody.innerHTML = pageData.rows.map((record, index) => renderRecordCard(record, currentPage * pageData.pageSize + index)).join('');
            updateThumbScrollHints(tbody);
        }

        function updateThumbScrollHint(wrap) {
            const strip = wrap.querySelector('.scroll-thumb-strip');
            if (!strip) return;
            const maxScroll = Math.max(0, strip.scrollWidth - strip.clientWidth);
            wrap.classList.toggle('has-left', strip.scrollLeft > 2);
            wrap.classList.toggle('has-right', maxScroll - strip.scrollLeft > 2);
        }

        function updateThumbScrollHints(root = document) {
            root.querySelectorAll('.image-thumb-wrap').forEach(wrap => {
                const strip = wrap.querySelector('.scroll-thumb-strip');
                if (!strip) return;
                updateThumbScrollHint(wrap);
                strip.addEventListener('scroll', () => updateThumbScrollHint(wrap));
            });
        }

        function scrollThumbStrip(button) {
            const wrap = button.closest('.image-thumb-wrap');
            const strip = wrap ? wrap.querySelector('.scroll-thumb-strip') : null;
            if (!strip) return;
            const direction = Number(button.getAttribute('data-thumb-scroll')) || 0;
            if (!direction) return;
            const maxScroll = Math.max(0, strip.scrollWidth - strip.clientWidth);
            const nextLeft = Math.max(0, Math.min(maxScroll, strip.scrollLeft + direction * (strip.clientWidth + 8)));
            strip.scrollTo({ left: nextLeft, behavior: 'smooth' });
            window.setTimeout(() => updateThumbScrollHint(wrap), 220);
        }

        function openRejectReasonModal(key, reason = '') {
            pendingRejectKey = key;
            const modal = document.getElementById('reject-reason-modal');
            const input = document.getElementById('reject-reason-input');
            if (!modal || !input) return;
            const presets = document.getElementById('reject-reason-presets');
