        }

        function markRecord(key, status, reason) {
            const record = findRecord(key);
            if (!record) return false;
            const finalReason = String(reason == null ? record.reviewReason : reason).trim();
            if (status === 'rejected' && !finalReason) {
                openRejectReasonModal(key, record.reviewReason);
                return false;
            }
            record.reviewStatus = status;
            record.reviewReason = status === 'rejected' ? finalReason : '';
            record.reviewTime = nowText();
            record.localEditAt = Date.now();
            saveProgress(record);
            render(true);
            syncReviewToFeishu(record);
            return true;
        }

        function download(filename, content, type) {
            const blob = new Blob([content], { type });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
        }

        function sanitizeExportFileName(name) {
            const cleaned = String(name || '').trim()
                .replace(/[\\/:*?"<>|]/g, '_')
                .replace(/\s+/g, ' ');
            return cleaned || '明星同款舆情风险复审结果';
        }

        function defaultExportFileName() {
            const pad = n => String(n).padStart(2, '0');
            const now = new Date();
            return `明星同款舆情风险复审结果_${now.getFullYear()}${pad(now.getMonth() + 1)}${pad(now.getDate())}_${pad(now.getHours())}${pad(now.getMinutes())}.xls`;
        }

        async function exportXlsWithCustomName() {
            const xml = toXls(records);
            const type = 'application/vnd.ms-excel;charset=utf-8';
            const defaultName = defaultExportFileName();

            if (window.showSaveFilePicker) {
                try {
                    const handle = await window.showSaveFilePicker({
                        suggestedName: defaultName,
                        types: [{
                            description: 'Excel 97-2003 工作簿',
                            accept: { 'application/vnd.ms-excel': ['.xls'] }
                        }]
                    });
                    const writable = await handle.createWritable();
                    await writable.write(new Blob([xml], { type }));
                    await writable.close();
                    showToast('Excel 已保存');
                    return;
                } catch (error) {
                    if (error && error.name === 'AbortError') return;
                    console.warn('系统保存窗口不可用，降级为命名下载', error);
                }
            }

            const input = prompt('请输入导出的 Excel 文件名', defaultName);
            if (input === null) return;
            let filename = sanitizeExportFileName(input);
            if (!/\.xls$/i.test(filename)) filename += '.xls';
            download(filename, xml, type);
        }

        function showToast(message) {
            let toast = document.querySelector('.toast');
            if (!toast) {
                toast = document.createElement('div');
                toast.className = 'toast';
                document.body.appendChild(toast);
            }
            toast.textContent = message;
            toast.getBoundingClientRect(); // force reflow
            toast.classList.add('show');
            clearTimeout(toast.timeoutId);
            toast.timeoutId = setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        function copyToClipboard(text, message = '已复制到剪贴板') {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text)
                    .then(() => showToast(message))
                    .catch(err => {
                        console.error('Failed to copy: ', err);
                        fallbackCopyToClipboard(text, message);
                    });
            } else {
                fallbackCopyToClipboard(text, message);
            }
        }

        function fallbackCopyToClipboard(text, message) {
            const textArea = document.createElement('textarea');
            textArea.value = text;
            textArea.style.position = 'fixed';
            textArea.style.left = '-999999px';
            textArea.style.top = '-999999px';
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            try {
                document.execCommand('copy');
                showToast(message);
            } catch (err) {
                console.error('Fallback copy failed', err);
            }
            document.body.removeChild(textArea);
        }

        function toXls(source) {
            const headers = ['行号', 'SPU ID', '商品标题', '品牌', '明星同款', '一级类目', '二级类目', '三级类目', '一级管理类目', '品牌等级', 'AI预评分', 'AI评分级别', '提报类型', '送审图片', '规格首图', '社区链接', '站外链接', '复审结果', '不通过原因', '复审时间'];
            const rows = source.map(record => [
                record.rowIndex + 1,
                record.spuId,
                record.spuTitle,
                record.brandName,
                record.sameStyleLabel,
                record.categoryLv1,
                record.categoryLv2,
                record.categoryLv3,
                record.managementLv1,
                record.brandLevel,
                record.preAuditScore === -1 ? '' : record.preAuditScore,
                aiScoreLevelText(record.aiScoreLevel),
                record.applyType,
                record.imageUrls.join('\n'),
                record.specFirstImages.join('\n'),
                record.communityLink,
                record.externalLink,
                statusText(record.reviewStatus),
                record.reviewReason,
                record.reviewTime,
            ]);

            let xml = `<?xml version="1.0" encoding="utf-8"?>
<?mso-application progid="Excel.Sheet"?>
<Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet"
 xmlns:o="urn:schemas-microsoft-com:office:office"
 xmlns:x="urn:schemas-microsoft-com:office:excel"
 xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet"
 xmlns:html="http://www.w3.org/TR/REC-html40">
 <Styles>
  <Style ss:ID="Default" ss:Name="Normal">
   <Alignment ss:Vertical="Bottom"/>
   <Borders/>
   <Font ss:FontName="Arial" x:CharSet="134" ss:Size="10" ss:Color="#000000"/>
   <Interior/>
   <NumberFormat/>
   <Protection/>
  </Style>
 </Styles>
 <Worksheet ss:Name="Sheet1">
  <Table>`;

            // Write Headers
            xml += '\n   <Row>';
            headers.forEach(h => {
                xml += `\n    <Cell><Data ss:Type="String">${htmlEscape(h)}</Data></Cell>`;
            });
            xml += '\n   </Row>';

            // Write Rows
            rows.forEach(row => {
                xml += '\n   <Row>';
                row.forEach((val, idx) => {
                    const isNum = (idx === 0 || (idx === 10 && val !== ''));
                    const type = isNum ? 'Number' : 'String';
                    xml += `\n    <Cell><Data ss:Type="${type}">${htmlEscape(val)}</Data></Cell>`;
                });
                xml += '\n   </Row>';
            });

            xml += `\n  </Table>\n </Worksheet>\n</Workbook>`;
            return xml;
        }

        function bindEvents() {
            document.querySelectorAll('.filters .control').forEach(el => {
                if (el.id === 'filter-query') {
                    let timeout = null;
                    el.addEventListener('input', () => {
                        clearTimeout(timeout);
                        timeout = setTimeout(() => {
                            currentPage = 0;
                            render();
                        }, 500);
                    });
                } else {
                    // Modern browsers fire 'input' and 'change' on select boxes. We only need to listen to 'change' below to prevent double rendering.
                }
                el.addEventListener('change', () => {
                    if (el.id === 'filter-category-lv1') {
                        const lv2 = document.getElementById('filter-category-lv2');
                        const lv3 = document.getElementById('filter-category-lv3');
                        if (lv2) lv2.value = '';
                        if (lv3) lv3.value = '';
                        populateFilters();
                    } else if (el.id === 'filter-category-lv2') {
                        const lv3 = document.getElementById('filter-category-lv3');
                        if (lv3) lv3.value = '';
                        populateFilters();
                    } else if (el.id === 'filter-management-lv1') {
                        const mlv2 = document.getElementById('filter-management-lv2');
                        const mlv3 = document.getElementById('filter-management-lv3');
                        if (mlv2) mlv2.value = '';
                        if (mlv3) mlv3.value = '';
                        populateFilters();
                    } else if (el.id === 'filter-management-lv2') {
                        const mlv3 = document.getElementById('filter-management-lv3');
                        if (mlv3) mlv3.value = '';
                        populateFilters();
                    }
                    currentPage = 0;
                    render();
                });
            });
            const pageSize = document.getElementById('page-size');
            if (pageSize) pageSize.addEventListener('change', () => {
                currentPage = 0;
                render();
            });
            document.addEventListener('click', event => {
                const target = event.target;
                if (!(target instanceof Element)) return;

                if (target.id === 'btn-data-source-settings') {
                    openDataSourceSettings();
                    return;
                }
                if (target.id === 'btn-sync-feishu') {
                    syncFeishuData();
                    return;
                }
                if (target.id === 'btn-claim-task') {
                    claimFeishuTasks();
                    return;
                }
                if (target.id === 'btn-excel-menu') {
                    const panel = document.getElementById('excel-menu-panel');
                    if (panel) panel.hidden = !panel.hidden;
                    return;
                }
                if (!target.closest('#excel-menu')) {
                    const panel = document.getElementById('excel-menu-panel');
                    if (panel) panel.hidden = true;
                }
                if (target.closest('[data-close-data-source-settings]') || target.id === 'data-source-settings-modal') {
                    closeDataSourceSettings();
                    return;
                }
                if (target.closest('[data-save-data-source-settings]')) {
                    saveDataSourceSettings();
                    closeDataSourceSettings();
                    return;
                }

                const copyText = target.closest('[data-copy-text]');
                if (copyText) {
                    const text = copyText.getAttribute('data-copy-text');
                    const isUrl = text.startsWith('http://') || text.startsWith('https://');
                    copyToClipboard(text, isUrl ? '图片链接已复制' : 'SPU ID 已复制');
                    return;
                }

                const clearFilter = target.closest('[data-clear-filter]');
                if (clearFilter) {
                    clearFilterValue(clearFilter.getAttribute('data-clear-filter'));
                    populateFilters();
                    currentPage = 0;
                    render();
                    return;
                }
                const thumbScroll = target.closest('[data-thumb-scroll]');
                if (thumbScroll) {
                    scrollThumbStrip(thumbScroll);
                    return;
                }
                const heroThumb = target.closest('[data-hero-url]');
                if (heroThumb) {
                    const imagePanel = heroThumb.closest('.image-panel');
                    const hero = imagePanel ? imagePanel.querySelector('.hero-stage img') : null;
                    const url = heroThumb.getAttribute('data-hero-url');
                    if (hero && url) {
                        hero.src = url;
                        hero.dataset.previewUrl = url;
                    }
                    return;
                }
                const preview = target.closest('[data-preview-url]');
                if (preview) {
                    const modal = document.getElementById('image-preview-modal');
                    const img = document.getElementById('preview-modal-img');
                    if (modal && img) {
                        img.src = preview.getAttribute('data-preview-url');
                        modal.hidden = false;
                    }
                    return;
                }
                const approve = target.closest('[data-approve]');
                if (approve) markRecord(approve.getAttribute('data-approve'), 'approved', '');
                
                const reject = target.closest('[data-reject]');
                if (reject) {
                    const key = reject.getAttribute('data-reject');
                    const reasonEl = document.getElementById('review-reason-' + key);
                    let reason = reasonEl ? reasonEl.value.trim() : '';
                    if (!reason) {
                        const record = findRecord(key);
                        openRejectReasonModal(key, record ? record.reviewReason : '');
                        return;
                    }
                    markRecord(key, 'rejected', reason);
                }
                if (target.closest('[data-close-reject-reason]') || target.id === 'reject-reason-modal') {
                    closeRejectReasonModal();
                }
                const reasonPreset = target.closest('[data-reject-reason-preset]');
                if (reasonPreset) {
                    const cardActions = reasonPreset.closest('.review-inline-actions');
                    const input = cardActions ? cardActions.querySelector('textarea') : document.getElementById('reject-reason-input');
                    if (input) {
                        input.value = reasonPreset.getAttribute('data-reject-reason-preset') || '';
                        input.focus();
                    }
                    setText('reject-reason-error', '');
                    return;
                }
                if (target.closest('[data-submit-reject-reason]')) {
                    const input = document.getElementById('reject-reason-input');
                    const reason = input ? input.value.trim() : '';
                    if (!reason) {
                        setText('reject-reason-error', '不通过原因不能为空');
                        if (input) input.focus();
                        return;
                    }
                    const reasonEl = document.getElementById('review-reason-' + pendingRejectKey);
                    if (reasonEl) reasonEl.value = reason;
                    if (markRecord(pendingRejectKey, 'rejected', reason)) {
                        closeRejectReasonModal();
                    }
                }
                if (target.id === 'btn-prev-page') {
                    currentPage -= 1;
                    render();
                }
                if (target.id === 'btn-next-page') {
                    currentPage += 1;
                    render();
                }
                if (target.id === 'image-preview-modal') target.hidden = true;
                if (target.id === 'btn-close-image-preview') document.getElementById('image-preview-modal').hidden = true;
                if (target.id === 'btn-export-xls') {
                    const panel = document.getElementById('excel-menu-panel');
                    if (panel) panel.hidden = true;
                    exportXlsWithCustomName().catch(error => alert(error.message || '导出失败：未知错误'));
                    return;
                }
            });
            document.addEventListener('keydown', event => {
                if (event.key === 'Escape') {
                    const dataSourceModal = document.getElementById('data-source-settings-modal');
                    if (dataSourceModal && !dataSourceModal.hidden) {
                        closeDataSourceSettings();
                        event.preventDefault();
                        return;
                    }
                    const rejectModal = document.getElementById('reject-reason-modal');
                    if (rejectModal && !rejectModal.hidden) {
                        closeRejectReasonModal();
                        event.preventDefault();
                        return;
                    }
                    const modal = document.getElementById('image-preview-modal');
                    if (modal && !modal.hidden) {
                        modal.hidden = true;
                        event.preventDefault();
                        return;
                    }
                }
            });
            const fileInput = document.getElementById('file-input');
            if (fileInput) {
                fileInput.addEventListener('change', event => {
                    const file = event.target.files && event.target.files[0];
                    if (!file) return;
                    showLoading(`正在载入并解析 ${file.name}，请稍候...`, '0%');
                    setTimeout(async () => {
                        try {
                            setDataSourceMode('local');
                            pendingReviewRows.clear();
                            activeWriteRows.clear();
                            reviewWriteQueue.clear();
                            persistPendingReviewRows();
                            stopFeishuSilentSyncForLocalMode();
                            const parsed = await parseLocalDataFile(file);
                            if (parsed.errors && parsed.errors.length) showToast(parsed.errors[0].message || `有 ${parsed.errors.length} 行解析提示`);
                            localStorage.removeItem(STORAGE_KEY);
                            showLoading(`正在渲染 ${file.name}，请稍候...`, '');
                            setRecords(parsed.records, false);
                            showLoading(`加载完成 ${file.name}`, '');
                            setText('source-label', `数据源：线下文件 / ${file.name} / ${parsed.records.length} 条`);
                            updateTopSyncStatus('实时保存');
                        } catch (err) {
                            alert('导入失败: ' + err.message);
                        } finally {
                            hideLoading();
                        }
                    }, 50);
                });
            }
            const claimCount = document.getElementById('claim-count');
            if (claimCount) {
                claimCount.addEventListener('input', () => writeFeishuConfig({ claimCount: claimCount.value || '20' }));
            }
            window.addEventListener('resize', () => {
                syncStickyOffsets();
            });
            document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'hidden') {
                    flushReviewWriteQueue(false);
                }
            });
        }


        async function parseLocalDataFile(file) {
            const lowerName = String(file && file.name || '').toLowerCase();
            const supported = /\.(xlsx|xls|csv|tsv|txt|xml|html?|ndjson|json)$/i.test(lowerName);
            if (!supported) {
                throw new Error('当前版本支持 .xlsx / .xls / .csv / .tsv / .xml / .html / .json / .ndjson 文件。');
            }

            const buffer = await readFileArrayBufferWithProgress(file);
            showLoading(`正在解析 ${file.name}，请稍候...`, '');

            const isExcelLike = /\.(xlsx|xls)$/i.test(lowerName);
            if (isExcelLike && window.XLSX) {
                try {
                    const workbook = XLSX.read(buffer, {
                        type: 'array',
                        cellDates: true,
                        cellText: false,
                        raw: false,
                        WTF: false,
                    });
                    const parsed = parseWorkbookToRecords(workbook);
                    if (parsed.records.length) return parsed;
                } catch (error) {
                    console.warn('按二进制 Excel 解析失败，尝试文本/另存为格式 fallback', error);
                }
            }

            const text = decodeLocalFileText(new Uint8Array(buffer));
            const parsedText = parseReviewData(text);
            if (parsedText.records && parsedText.records.length) {
                return parsedText;
            }

            if (/<table[\s>]/i.test(text)) {
                const parsedHtml = parseHtmlTable(text);
                if (parsedHtml.records.length) return parsedHtml;
            }

            if (isExcelLike && !window.XLSX) {
                throw new Error('检测到 xlsx/xls 文件，但 Excel 二进制解析库未加载成功。当前文件如果是真正的二进制 xlsx，不能按文本读取；请确认网络可访问 cdn.jsdelivr.net，或另存为 CSV/XML 后导入。');
            }

            throw new Error('文件已读取，但未识别到有效数据。请确认第一张有效工作表有表头和数据行。');
        }

        async function readFileArrayBufferWithProgress(file) {
            if (!file.stream) {
                return await file.arrayBuffer();
            }

            const reader = file.stream().getReader();
            const chunks = [];
            let loaded = 0;
            while (true) {
                const { value, done } = await reader.read();
                if (done) break;
                chunks.push(value);
                loaded += value.byteLength || value.length || 0;
                showLoading(`正在读取 ${file.name}，请稍候...`, '');
            }

            const bytes = new Uint8Array(loaded);
            let offset = 0;
            chunks.forEach(chunk => {
                bytes.set(chunk, offset);
                offset += chunk.byteLength || chunk.length || 0;
            });
            return bytes.buffer;
        }

        function decodeLocalFileText(bytes) {
            if (!bytes || !bytes.length) return '';
            if (bytes.length >= 2 && bytes[0] === 0xFF && bytes[1] === 0xFE) {
                return new TextDecoder('utf-16le').decode(bytes);
            }
            if (bytes.length >= 2 && bytes[0] === 0xFE && bytes[1] === 0xFF) {
                return new TextDecoder('utf-16be').decode(bytes);
            }
            return new TextDecoder('utf-8').decode(bytes);
        }

        function parseWorkbookToRecords(workbook) {
            const best = pickBestWorksheet(workbook);
            if (!best) return { records: [], errors: [{ line: 1, message: '未找到有效工作表' }] };
            const converted = worksheetRowsToObjects(best.rows);
            return {
                records: converted.rows,
                errors: converted.skippedRows ? [{ line: converted.headerRow + 1, message: `已自动跳过表头前空行 ${converted.skippedRows} 行` }] : []
            };
        }

        function pickBestWorksheet(workbook) {
            let best = null;
            (workbook.SheetNames || []).forEach(sheetName => {
                const sheet = workbook.Sheets[sheetName];
                if (!sheet) return;
                let rows = XLSX.utils.sheet_to_json(sheet, {
                    header: 1,
                    defval: '',
                    raw: false,
                    blankrows: false,
                });
                rows = normalizeSheetRows(rows);
                if (!rows.length) return;
                const score = scoreWorksheetRows(rows);
                if (!best || score > best.score) best = { sheetName, rows, score };
            });
            return best;
        }

        function normalizeSheetRows(rows) {
            return (rows || [])
                .map(row => (Array.isArray(row) ? row : []).map(normalizeExcelCell))
                .filter(row => row.some(cell => String(cell || '').trim() !== ''));
        }

        function normalizeExcelCell(value) {
            if (value == null) return '';
            if (value instanceof Date) {
                const pad = n => String(n).padStart(2, '0');
                return `${value.getFullYear()}-${pad(value.getMonth() + 1)}-${pad(value.getDate())} ${pad(value.getHours())}:${pad(value.getMinutes())}`;
            }
            if (typeof value === 'object') {
                if ('text' in value) return String(value.text || '').trim();
                if ('w' in value) return String(value.w || '').trim();
                if ('v' in value) return String(value.v || '').trim();
                return String(JSON.stringify(value)).trim();
            }
            return String(value)
                .replace(/\u00A0/g, ' ')
                .replace(/\r\n/g, '\n')
                .trim();
        }

        function scoreWorksheetRows(rows) {
            const headerIndex = detectHeaderRowIndex(rows);
            const header = rows[headerIndex] || [];
            const known = countKnownHeaderCells(header);
            const width = header.filter(Boolean).length;
            const dataRows = Math.max(0, rows.length - headerIndex - 1);
            return known * 1000 + Math.min(width, 80) * 10 + Math.min(dataRows, 500);
        }

        function detectHeaderRowIndex(rows) {
            const max = Math.min(rows.length, 20);
            let fallback = 0;
            for (let i = 0; i < max; i++) {
                const row = rows[i] || [];
                const nonEmpty = row.filter(v => String(v || '').trim()).length;
                if (nonEmpty >= 2 && fallback === 0) fallback = i;
                const known = countKnownHeaderCells(row);
                if (known >= 2) return i;
            }
            return fallback;
        }

        function countKnownHeaderCells(row) {
            const knownKeys = [
                'spu', 'spu id', 'spuid', '商品id', '商品标题', '标题', '品牌',
                '明星同款', '明星', '一级类目', '二级类目', '三级类目',
                '送审图片', '图片', '规格首图', '社区链接', '站外链接',
                '复审结果', '审核状态', '不通过原因', '审核备注', '复审时间', '审核时间'
            ];
            return (row || []).reduce((count, cell) => {
                const text = String(cell || '').trim().toLowerCase();
                if (!text) return count;
                return count + (knownKeys.some(key => text === key || text.includes(key)) ? 1 : 0);
            }, 0);
        }

        function worksheetRowsToObjects(rows) {
            const headerRow = detectHeaderRowIndex(rows);
            const headers = makeUniqueHeaders(rows[headerRow] || []);
            const dataRows = rows.slice(headerRow + 1);
            const objects = [];

            dataRows.forEach((row, rowOffset) => {
                const obj = {};
                let nonEmpty = 0;
                headers.forEach((header, colIndex) => {
                    const key = header || `列${colIndex + 1}`;
                    const value = normalizeExcelCell(row[colIndex]);
                    if (value) nonEmpty += 1;
                    obj[key] = value;
                });
                if (nonEmpty) {
                    obj.__sourceRowNumber = headerRow + rowOffset + 2;
                    objects.push(obj);
                }
            });

            return { rows: objects, headerRow, skippedRows: headerRow };
        }

        function makeUniqueHeaders(headerRow) {
            const seen = Object.create(null);
            return (headerRow || []).map((cell, index) => {
                let name = normalizeExcelCell(cell)
                    .replace(/\n+/g, ' ')
                    .replace(/\s+/g, ' ')
                    .trim();
                if (!name) name = `列${index + 1}`;
                const base = name;
                seen[base] = (seen[base] || 0) + 1;
                if (seen[base] > 1) name = `${base}_${seen[base]}`;
                return name;
            });
        }

        function parseHtmlTable(text) {
            try {
                const doc = new DOMParser().parseFromString(String(text || ''), 'text/html');
                const tables = Array.from(doc.querySelectorAll('table'));
                let best = null;

                tables.forEach(table => {
                    const rows = Array.from(table.querySelectorAll('tr')).map(tr =>
                        Array.from(tr.children).map(td => normalizeExcelCell(td.textContent || ''))
                    );
                    const normalized = normalizeSheetRows(rows);
                    if (!normalized.length) return;
                    const score = scoreWorksheetRows(normalized);
                    if (!best || score > best.score) best = { rows: normalized, score };
                });

                if (!best) return { records: [], errors: [] };
                const converted = worksheetRowsToObjects(best.rows);
                return { records: converted.rows, errors: [] };
            } catch (error) {
                console.warn('HTML 表格解析失败', error);
                return { records: [], errors: [{ line: 1, message: error.message }] };
            }
        }

        async function readFileTextWithProgress(file) {
            if (!file.stream || !window.TextDecoder) {
                const text = await file.text();
                showLoading(`正在载入并解析 ${file.name}，请稍候...`, '60%');
                return text;
            }
            const reader = file.stream().getReader();
            const decoder = new TextDecoder();
            const chunks = [];
            let loaded = 0;
            while (true) {
                const { value, done } = await reader.read();
                if (done) break;
                loaded += value.length;
                chunks.push(decoder.decode(value, { stream: true }));
                const percent = file.size ? Math.min(60, Math.floor((loaded / file.size) * 60)) : 60;
                showLoading(`正在载入并解析 ${file.name}，请稍候...`, `${percent}%`);
            }
            chunks.push(decoder.decode());
            showLoading(`正在载入并解析 ${file.name}，请稍候...`, '60%');
            return chunks.join('');
        }

        function showLoading(text, countdown) {
            const overlay = document.getElementById('loading-overlay');
            if (overlay) {
                if (text) {
                    const textEl = overlay.querySelector('.loading-text');
                    if (textEl) textEl.textContent = text;
                }

                let track = overlay.querySelector('.loading-progress-track');
                if (!track) {
                    track = document.createElement('div');
                    track.className = 'loading-progress-track';
                    const bar = document.createElement('div');
                    bar.className = 'loading-progress-bar';
                    track.appendChild(bar);
                    overlay.appendChild(track);
                }

                let detail = overlay.querySelector('.loading-progress-detail');
                if (!detail) {
                    detail = document.createElement('div');
                    detail.className = 'loading-progress-detail';
                    overlay.appendChild(detail);
                }

                const localMode = isLocalFileMode();
                const countdownEl = document.getElementById('loading-countdown');

                if (localMode) {
                    if (countdownEl) {
                        countdownEl.textContent = '';
                        countdownEl.hidden = true;
                    }
                    track.hidden = true;
                    detail.hidden = true;
                } else {
                    const countdownText = countdown != null ? String(countdown) : '';
                    if (countdownEl) {
                        countdownEl.hidden = false;
                        const percentMatch = countdownText.match(/\d+(?:\.\d+)?%/);
                        countdownEl.textContent = percentMatch ? percentMatch[0] : countdownText;
                    }

                    const bar = overlay.querySelector('.loading-progress-bar');
                    const percentMatch = countdownText.match(/(\d+(?:\.\d+)?)%/);
                    if (bar) {
                        const percent = percentMatch ? Math.max(0, Math.min(100, Number(percentMatch[1]))) : 0;
                        bar.style.width = percent + '%';
                    }
                    track.hidden = false;
                    detail.hidden = false;
                    detail.textContent = countdownText;
                }

                overlay.classList.remove('fade-out');
            }
        }

        function hideLoading() {
            const overlay = document.getElementById('loading-overlay');
            if (overlay) {
                overlay.classList.add('fade-out');
            }
        }

        function readEmbeddedText(embedded) {
            if (!embedded || !embedded.firstChild) return '';
            return embedded.firstChild.nodeValue || '';
        }

        function base64ToBytes(text) {
            const clean = String(text || '').replace(/\s+/g, '');
            const chunkSize = 32768;
            const chunks = [];
            let total = 0;
            for (let offset = 0; offset < clean.length; offset += chunkSize) {
                const binary = atob(clean.slice(offset, offset + chunkSize));
                const chunk = new Uint8Array(binary.length);
                for (let i = 0; i < binary.length; i++) {
                    chunk[i] = binary.charCodeAt(i);
                }
                chunks.push(chunk);
                total += chunk.length;
            }
            const bytes = new Uint8Array(total);
            let cursor = 0;
            for (let i = 0; i < chunks.length; i++) {
                bytes.set(chunks[i], cursor);
                cursor += chunks[i].length;
            }
            return bytes;
        }

        async function gunzipBase64Text(text) {
            if (typeof DecompressionStream !== 'function') {
                throw new Error('当前浏览器不支持压缩数据解码，请使用最新版 Chrome 或 Edge');
            }
            const stream = new Blob([base64ToBytes(text)])
                .stream()
                .pipeThrough(new DecompressionStream('gzip'));
            return await new Response(stream).text();
        }

        async function readEmbeddedPayload(embedded) {
            const text = readEmbeddedText(embedded);
            if (!embedded || embedded.getAttribute('data-encoding') !== 'gzip-base64') {
                return text;
            }
            showLoading('正在解压内嵌数据，请稍候...', '0%');
            return await gunzipBase64Text(text);
        }

        function getFirstDataOffset(text) {
            const source = String(text || '');
            for (let i = 0; i < source.length; i++) {
                const code = source.charCodeAt(i);
                if (code !== 10 && code !== 13 && code !== 32 && code !== 9) return i;
            }
            return -1;
        }

        function parseEmbeddedRowsAsync(text, onComplete, onFirstBatch) {
            const source = String(text || '');
            const totalLength = source.length;
            let offset = Math.max(0, getFirstDataOffset(source));
            let rowIndex = 0;
            let headers = null;
            const parsedRecords = [];
            const firstBatchSize = 200;
            let firstBatchSent = false;

            const firstChar = source[offset] || '';
            const isNdjson = firstChar === '{' || firstChar === '[';

            function readLine() {
                if (offset >= totalLength) return null;
                let next = source.indexOf('\n', offset);
                if (next === -1) next = totalLength;
                let line = source.slice(offset, next);
                if (line.endsWith('\r')) line = line.slice(0, -1);
                offset = next + 1;
                return line;
            }

            if (!isNdjson) {
                const headerLine = readLine();
                headers = headerLine ? headerLine.split('\t').map(unescapeTsvCell) : [];
            }

            function processChunk() {
                const startTime = performance.now();
                while (offset < totalLength && performance.now() - startTime < 20) {
                    const line = readLine();
                    if (!line || !line.trim()) continue;
                    try {
                        let rowObj;
                        if (isNdjson) {
                            rowObj = JSON.parse(line.trim());
                        } else {
                            const values = line.split('\t');
                            rowObj = {};
                            for (let k = 0; k < headers.length; k++) {
                                const value = values[k];
                                if (headers[k] && value) rowObj[headers[k]] = unescapeTsvCell(value);
                            }
                        }
                        parsedRecords.push(normalizeRecord(rowObj, rowIndex));
                        rowIndex++;
                        if (!firstBatchSent && parsedRecords.length >= firstBatchSize) {
                            firstBatchSent = true;
                            if (typeof onFirstBatch === 'function') onFirstBatch(parsedRecords.slice());
                        }
                    } catch (error) { }
                }

                const percent = totalLength ? Math.min(99, Math.floor((offset / totalLength) * 100)) : 100;
                showLoading('正在极速加载与初始化数据，请稍候...', `${percent}%`);

                if (offset < totalLength) {
                    requestAnimationFrame(() => setTimeout(processChunk, 0));
                } else {
                    if (!firstBatchSent && typeof onFirstBatch === 'function') {
                        onFirstBatch(parsedRecords.slice());
                    }
                    onComplete(parsedRecords);
                }
            }

            processChunk();
        }

        async function boot() {
            bindEvents();
            updateFeishuSourceLabel();
            startTopStatusTicker();
            ensureReviewWriteTimer();
            const claimCount = document.getElementById('claim-count');
            const savedFeishuConfig = readFeishuConfig();
            if (claimCount) claimCount.value = savedFeishuConfig.claimCount || 20;
            setRecords([], false, true);
            if (isLocalFileMode()) {
                stopFeishuSilentSyncForLocalMode();
            } else {
                startFeishuSilentSync();
                setTimeout(silentSyncFeishuData, 1200);
            }
            hideLoading();
        }

        window.StarRiskReview = {
            appendRecords,
            buildRecordKey,
            clearFilterValue,
            createRowFingerprint,
            filterRecords,
            formatAiScore,
            getAiScoreLevel,
            getAvailableActions,
            getFilterOptions,
            mergeAndDeduplicate,
            normalizeRecord,
            paginateRecords,
            parseNdjson,
            parseReviewData,
            parseXmlSpreadsheet,
            splitImageUrls,
            syncStickyOffsets,
            summarizeRecords,
            toXls,
        };

        if (!window.__STAR_RISK_REVIEW_TEST__) {
            document.addEventListener('DOMContentLoaded', boot);
        }
    }());
    </script>
