    <style>
        * { box-sizing: border-box; }
        [hidden] { display: none !important; }
        :root {
            --bg: #151821;
            --panel: #1d2430;
            --panel-2: #242d3b;
            --header-bg: #151821;
            --header-panel: #1d2430;
            --review-sticky-top: 68px;
            --review-sticky-height: 134px;
            --table-head-top: 292px;
            --line: #344154;
            --text: #edf2f7;
            --muted: #9aa8ba;
            --green: #43c67a;
            --red: #ff6678;
            --amber: #f5b84b;
            --blue: #4f9cf9;
            --chip: #111721;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, .20);
            --shadow-md: 0 24px 80px rgba(0, 0, 0, .36);
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: "PingFang SC", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            font-size: 14px;
            font-variant-numeric: tabular-nums;
        }
        button, input, select, textarea {
            font: inherit;
        }
        button, .clickable {
            cursor: pointer;
        }
        button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible {
            outline: 2px solid var(--blue);
            outline-offset: 2px;
        }
        .toolbar {
            position: sticky;
            top: 0;
            z-index: 30;
            display: grid;
            grid-template-columns: minmax(260px, 1fr) auto;
            gap: 16px;
            align-items: center;
            min-height: 68px;
            padding: 12px 24px;
            border-bottom: 1px solid var(--line);
            background: var(--header-bg);
            color: var(--text);
            box-shadow: 0 12px 30px rgba(0, 0, 0, .22);
        }
        h1 {
            margin: 0;
            color: var(--text);
            font-size: 18px;
            font-weight: 650;
            line-height: 1.25;
            letter-spacing: 0;
        }
        .subtitle {
            margin-top: 4px;
            color: var(--muted);
            font-family: "Fira Code", ui-monospace, SFMono-Regular, Menlo, monospace;
            font-size: 12px;
            letter-spacing: 0;
        }
        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: flex-end;
        }
        .btn {
            min-height: 34px;
            padding: 7px 12px;
            border: 1px solid var(--line);
            border-radius: 4px;
            background: #19202b;
            color: var(--text);
            box-shadow: 0 1px 1px rgba(0, 0, 0, .18);
            transition: background-color .18s ease, border-color .18s ease, color .18s ease, box-shadow .18s ease;
        }
        .toolbar .btn {
            border-color: var(--line);
            background: var(--header-panel);
            color: #d8e7fb;
            box-shadow: none;
        }
        .toolbar .btn:hover {
            border-color: var(--blue);
            background: #202b3a;
            color: var(--text);
        }
        .sync-status-line {
            margin-top: 2px;
            color: #7f91a8;
        }
        .toolbar .btn.claiming {
            border-color: rgba(79, 156, 249, .7);
            color: #d8e7fb;
        }
        .toolbar .btn.done {
            border-color: rgba(67, 198, 122, .75);
            color: #73e49d;
        }
        .toolbar .btn.error {
            border-color: rgba(255, 102, 120, .75);
            color: var(--red);
        }
        .excel-menu {
            position: relative;
            display: inline-flex;
        }
        .excel-menu-panel {
            position: absolute;
            right: 0;
            top: calc(100% + 6px);
            z-index: 60;
            min-width: 132px;
            padding: 6px;
            border: 1px solid var(--line);
            border-radius: 6px;
            background: #1a2230;
            box-shadow: 0 14px 34px rgba(0, 0, 0, .32);
        }
        .excel-menu-item {
            display: block;
            width: 100%;
            min-height: 32px;
            padding: 7px 10px;
            border: 0;
            border-radius: 4px;
            background: transparent;
            color: var(--text);
            text-align: left;
            white-space: nowrap;
            cursor: pointer;
        }
        .excel-menu-item:hover {
            background: #253044;
        }
        .btn:hover {
            border-color: var(--blue);
            background: #202b3a;
            box-shadow: 0 2px 8px rgba(79, 156, 249, .12);
        }
        button:focus-visible,
        input:focus-visible,
        select:focus-visible,
        textarea:focus-visible,
        a:focus-visible,
        [data-preview-url]:focus-visible,
        [data-hero-url]:focus-visible {
            outline: 2px solid var(--blue);
            outline-offset: 2px;
        }
        .btn.approve {
            border-color: #2ecc71;
            background: transparent;
            color: #2ecc71;
            border-style: solid;
            font-weight: 600;
        }
        .btn.approve:hover {
            background: rgba(46, 204, 113, 0.1);
        }
        .btn.approve.active {
            background: #2ecc71;
            border-color: #2ecc71;
            border-style: solid;
            color: #fff;
            box-shadow: 0 4px 12px rgba(46, 204, 113, .3);
        }
        .btn.reject {
            border-color: #e74c3c;
            background: transparent;
            color: #e74c3c;
            border-style: solid;
            font-weight: 600;
        }
        .btn.reject:hover {
            background: rgba(231, 76, 60, 0.1);
        }
        .btn.reject.active {
            background: #e74c3c;
            border-color: #e74c3c;
            border-style: solid;
            color: #fff;
            box-shadow: 0 4px 12px rgba(231, 76, 60, .3);
        }
        main {
            padding: 0 24px 32px;
        }
        .review-sticky {
            position: fixed;
            top: var(--review-sticky-top, 68px);
            left: 0;
            right: 0;
            z-index: 25;
            display: grid;
            gap: 8px;
            margin: 0;
            padding: 8px 24px;
            border-bottom: 1px solid rgba(52, 65, 84, .75);
            background: var(--bg);
            box-shadow: 0 8px 20px rgba(0, 0, 0, .18);
        }
        .filters {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            justify-content: start;
            width: 100%;
            max-width: 100%;
            gap: 12px;
            align-items: center;
            padding: 12px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--panel);
            box-shadow: 0 1px 0 rgba(0, 0, 0, .18);
        }
        .field {
            display: grid;
            grid-template-columns: max-content minmax(0, 1fr);
            align-items: center;
            gap: 8px;
            min-width: 0;
        }
        .field-search {
            grid-column: auto;
        }
        .field label {
            color: var(--muted);
            font-size: 12px;
            font-weight: 500;
            white-space: nowrap;
        }
        .control {
            width: 100%;
            min-height: 30px;
            border: 1px solid var(--line);
            border-radius: 4px;
            background: #111721;
            color: var(--text);
            padding: 0 9px;
            transition: border-color .18s ease, box-shadow .18s ease;
        }
        .control:hover {
            border-color: #46556b;
        }
        .control:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(79, 156, 249, .16);
        }
        .filter-control {
            position: relative;
            display: block;
            width: 100%;
            min-width: 0;
        }
        .filter-control .control {
            width: 100%;
        }
        .query-filter-control .control {
            padding-right: 34px;
        }
        .select-filter-control .control {
            padding-right: 52px;
        }
        .clear-filter {
            display: inline-grid;
            place-items: center;
            width: 24px;
            height: 24px;
            min-height: 24px;
            padding: 0;
            border: 1px solid transparent;
            border-radius: 4px;
            background: transparent;
            color: var(--muted);
            line-height: 1;
            box-shadow: none;
        }
        .query-clear-filter {
            position: absolute;
            top: 50%;
            right: 6px;
            width: 20px;
            height: 20px;
            min-height: 20px;
            padding: 0;
            border-radius: 999px;
            font-size: 16px;
            transform: translateY(-50%);
        }
        .select-clear-filter {
            position: absolute;
            top: 50%;
            right: 28px;
            width: 20px;
            height: 20px;
            min-height: 20px;
            padding: 0;
            border-radius: 999px;
            font-size: 16px;
            transform: translateY(-50%);
        }
        .clear-filter:hover {
            border-color: #46556b;
            background: #202b3a;
            color: var(--text);
            box-shadow: none;
        }
        .summary {
            display: grid;
            grid-template-columns: repeat(5, minmax(120px, 1fr));
            gap: 8px;
            margin: 0;
            padding: 0;
        }
        .metric {
            position: relative;
            min-height: 32px;
            padding: 5px 12px 5px 14px;
            border: 1px solid var(--line);
            border-radius: 6px;
            background: var(--panel);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
        }
        .metric::before {
            content: "";
            position: absolute;
            inset: 7px auto 7px 0;
            width: 3px;
            border-radius: 0 3px 3px 0;
            background: #344154;
        }
        .metric:nth-child(2)::before {
            background: var(--green);
        }
        .metric:nth-child(3)::before {
            background: var(--red);
        }
        .metric:nth-child(4)::before {
            background: var(--amber);
        }
        .metric span {
            display: inline;
            color: var(--muted);
            font-size: 12px;
            font-weight: 500;
        }
        .metric strong {
            display: inline;
            margin-left: 8px;
            font-family: "Fira Code", ui-monospace, SFMono-Regular, Menlo, monospace;
            font-size: 15px;
            font-weight: 650;
            letter-spacing: 0;
        }
        .metric strong.good { color: var(--green); }
        .metric strong.bad { color: var(--red); }
        .metric strong.warn { color: var(--amber); }
        .table-tools {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin: 0;
            padding: 2px 0 0;
            background: var(--bg);
            color: var(--muted);
            font-size: 12px;
        }
        .pager {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .pager .control {
            width: auto;
        }
        .detail-topline {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .muted {
            color: var(--muted);
        }
        .tag {
            display: inline-flex;
            align-items: center;
            min-height: 22px;
            padding: 2px 7px;
            border: 1px solid var(--line);
            border-radius: 999px;
            background: #111721;
            color: #c4ceda;
            font-size: 12px;
            font-weight: 500;
            white-space: nowrap;
        }
        .tag.detail-score {
            color: #d8e7fb;
        }
        .tag.detail-link {
            color: #78b7ff;
            text-decoration: none;
        }
        .tag.detail-link:hover {
            border-color: rgba(79, 156, 249, .55);
            background: rgba(79, 156, 249, .12);
        }
        .tag.approved {
            border-color: rgba(67, 198, 122, .42);
            background: rgba(67, 198, 122, .13);
            color: #73e49d;
        }
        .tag.rejected {
            border-color: rgba(255, 102, 120, .42);
            background: rgba(255, 102, 120, .12);
            color: var(--red);
        }
        .tag.pending {
            border-color: rgba(245, 184, 75, .42);
            background: rgba(245, 184, 75, .14);
            color: #ffd37a;
        }
        .thumb {
            flex: 0 0 auto;
            width: 52px;
            height: 52px;
            border: 1px solid var(--line);
            border-radius: 4px;
            background: #0f1520;
            object-fit: cover;
            box-shadow: 0 1px 2px rgba(0, 0, 0, .22);
        }
        .thumb-more {
            flex: 0 0 auto;
            display: inline-grid;
            place-items: center;
            width: 38px;
            height: 52px;
            border: 1px solid var(--line);
            border-radius: 4px;
            background: #111721;
            color: #b8c7d9;
            font-size: 12px;
            font-weight: 650;
        }
        .row-actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .review-workbench {
            display: flex;
            flex-direction: column;
            gap: 24px;
            margin-top: calc(var(--review-sticky-height, 134px) + 14px);
            min-height: calc(100vh - var(--review-sticky-height, 134px) - 108px);
            padding-bottom: 24px;
        }
        .record-queue,
        .review-card {
            min-height: 0;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--panel);
            box-shadow: 0 1px 0 rgba(0, 0, 0, .18);
        }
        .record-queue {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .queue-list {
            flex: 1;
            min-height: 0;
            overflow: auto;
            padding: 8px;
        }
        .queue-item {
            display: grid;
            gap: 8px;
            width: 100%;
            padding: 10px;
            border: 1px solid transparent;
            border-radius: 8px;
            background: transparent;
            color: var(--text);
            text-align: left;
        }
        .queue-item:hover {
            border-color: #46556b;
            background: #202b3a;
        }
        .queue-item.is-active {
            border-color: rgba(79, 156, 249, .58);
            background: rgba(79, 156, 249, .12);
        }
        .queue-item-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }
        .queue-item-title {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            color: #d8e7fb;
            font-size: 13px;
            line-height: 1.45;
        }
        .queue-item-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            color: var(--muted);
            font-size: 12px;
        }
        .queue-preview {
            display: flex;
            gap: 6px;
            align-items: center;
            overflow: hidden;
        }
        .queue-preview .thumb {
            width: 42px;
            height: 42px;
        }
        .review-card {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-left: 6px solid transparent;
            transition: border-color .2s ease, background-color .2s ease, box-shadow .2s ease;
        }
        .review-card--approved {
            border-color: rgba(46, 204, 113, .5);
            border-left-color: #2ecc71;
        }
        .review-card--rejected {
            border-color: rgba(231, 76, 60, .5);
            border-left-color: #e74c3c;
        }
        .review-card--pending {
            border-left-color: transparent;
        }
        .review-card.is-empty {
            align-items: center;
            justify-content: center;
            padding: 48px;
            color: var(--muted);
        }
        .review-card-header {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid var(--line);
            background: transparent;
        }
        .review-card--approved .review-card-header {
            background: rgba(46, 204, 113, .05);
        }
        .review-card--rejected .review-card-header {
            background: rgba(231, 76, 60, .05);
        }
        .verdict-badge {
            min-width: 82px;
            padding: 7px 12px;
            border: 2px solid rgba(245, 184, 75, .8);
            border-radius: 6px;
            color: #ffd37a;
            text-align: center;
            font-size: 20px;
            font-weight: 800;
            letter-spacing: 0;
        }
        .verdict-badge.pass {
            border-color: rgba(67, 198, 122, .8);
            color: #73e49d;
        }
        .verdict-badge.fail {
            border-color: rgba(255, 102, 120, .8);
            color: var(--red);
        }
        .review-card-title {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }
        .review-card-title strong {
            display: block;
            overflow: hidden;
            color: var(--text);
            font-size: 16px;
            line-height: 1.35;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .review-card-title span {
            display: block;
            color: #6c7a9c;
            font-family: monospace;
            font-size: 14px;
            font-weight: 600;
        }
        .review-card-body {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) minmax(320px, .95fr);
            gap: 16px;
            align-items: start;
            min-height: 0;
            padding: 16px;
        }
        .evidence-layout {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 16px;
            align-items: start;
        }
        .image-panel,
        .analysis-panel {
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #111721;
            padding: 14px;
            min-width: 0;
        }
        .panel-header {
            font-size: 15px;
            font-weight: 600;
            color: #fff;
            padding-bottom: 12px;
            border-bottom: 1px solid #2b3545;
            margin-bottom: 12px;
        }
        .hero-stage {
            display: grid;
            place-items: center;
            min-height: 380px;
            border: 1px solid #2b3545;
            border-radius: 8px;
            background: #f5f7fb;
            overflow: hidden;
            position: relative;
        }
        .hero-stage img {
            width: 100%;
            max-height: 440px;
            object-fit: contain;
        }
        .thumb-strip-mini {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 8px;
            margin-top: 12px;
        }
        .thumb-strip-mini img {
            width: 100%;
            aspect-ratio: 1;
            border: 1px solid var(--line);
            border-radius: 6px;
            background: #f5f7fb;
            object-fit: contain;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .thumb-strip-mini img:hover {
            border-color: #5c82ff;
        }
        .review-thumb-wrap,
        .spec-thumb-wrap {
            position: relative;
            min-width: 0;
        }
        .thumb-scroll-btn {
            position: absolute;
            top: 50%;
            z-index: 3;
            display: none;
            place-items: center;
            width: 26px;
            height: 26px;
            padding: 0;
            border: 1px solid rgba(92, 130, 255, 0.28);
            border-radius: 50%;
            background: rgba(248, 250, 255, 0.94);
            color: #33415f;
            box-shadow: 0 4px 12px rgba(34, 48, 74, 0.18);
            font-size: 18px;
            font-weight: 700;
            line-height: 1;
            cursor: pointer;
            transform: translateY(-50%);
        }
        .thumb-scroll-btn:hover {
            border-color: rgba(92, 130, 255, 0.48);
            background: #fff;
            color: #234fd8;
        }
        .thumb-scroll-btn--left {
            left: 4px;
        }
        .thumb-scroll-btn--right {
            right: 4px;
        }
        .image-thumb-wrap.has-left .thumb-scroll-btn--left,
        .image-thumb-wrap.has-right .thumb-scroll-btn--right {
            display: grid;
        }
        .thumb-scroll-btn:focus-visible {
            outline: 2px solid #5c82ff;
            outline-offset: 2px;
        }
        .scroll-thumb-strip {
            display: flex;
            flex-wrap: nowrap;
            width: 100%;
            min-width: 0;
            max-width: 100%;
            overflow-x: auto;
            scroll-snap-type: x proximity;
            padding-bottom: 4px;
        }
        .scroll-thumb-strip .thumb-mini {
            flex: 0 0 calc((100% - 16px) / 3);
            width: calc((100% - 16px) / 3);
            min-width: 0;
            max-width: calc((100% - 16px) / 3);
            scroll-snap-align: start;
        }
        .analysis-panel {
            display: flex;
            flex-direction: column;
            gap: 0;
            height: 100%;
            box-sizing: border-box;
        }
        .analysis-details {
            display: flex;
            flex-direction: column;
            gap: 16px;
            font-size: 14px;
            line-height: 1.5;
        }
        .detail-row {
            display: flex;
            align-items: flex-start;
            flex-direction: column;
            gap: 6px;
        }
        .detail-row strong {
            color: #8c9ebb;
            font-size: 12px;
        }
        .detail-row span, .detail-row a {
            color: #d1d9e6;
            word-break: break-all;
        }
        .detail-row a {
            color: #5c82ff;
            text-decoration: none;
        }
        .detail-row a:hover {
            text-decoration: underline;
        }
        .analysis-title {
            display: grid;
            gap: 6px;
            padding-bottom: 10px;
            border-bottom: 1px solid #2b3545;
        }
        .analysis-title strong {
            color: var(--text);
            font-size: 16px;
            line-height: 1.4;
        }
        .analysis-title span {
            color: var(--muted);
            font-size: 12px;
        }
        .reason-list {
            display: grid;
            gap: 8px;
        }
        .reason-row {
            display: grid;
            grid-template-columns: 24px 56px minmax(0, 1fr);
            gap: 8px;
            align-items: center;
            min-height: 34px;
            padding: 7px 10px;
            border: 1px solid #2b3545;
            border-radius: 6px;
            background: rgba(255, 255, 255, .03);
        }
        .reason-row .mark {
            display: inline-grid;
            place-items: center;
            width: 20px;
            height: 20px;
            border-radius: 999px;
            color: #73e49d;
            font-weight: 800;
        }
        .reason-row.is-risk .mark {
            color: var(--red);
        }
        .reason-row .pill {
            color: #8fbfff;
            font-weight: 700;
            font-size: 12px;
        }
        .info-row {
            grid-template-columns: 60px minmax(0, 1fr);
            align-items: start;
            padding: 10px;
            background: rgba(255, 255, 255, .02);
        }
        .info-row--center {
            align-items: center;
        }
        .info-label {
            color: #8c9ebb;
            padding-top: 1px;
        }
        .info-row--center .info-label {
            padding-top: 0;
        }
        .info-text {
            color: #d1d9e6;
            word-break: break-all;
            font-size: 13px;
            line-height: 1.4;
        }
        .brand-inline,
        .link-inline {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .link-inline {
            gap: 16px;
        }
        .brand-level-badge {
            border: 1px solid rgba(255,255,255,.1);
            border-radius: 4px;
            background: rgba(255,255,255,.05);
            color: #a4b5d0;
            padding: 1px 6px;
            font-size: 12px;
        }
        .inline-link {
            color: #5c82ff;
            text-decoration: none;
            font-size: 13px;
        }
        .inline-empty {
            color: #6c7a9c;
            font-size: 13px;
        }
        .inline-divider {
            color: #2b3545;
        }
        .ai-row {
            align-items: center;
            border: 1px solid transparent;
        }
        .ai-row--missing {
            background: rgba(255, 255, 255, .02);
        }
        .ai-row--low {
            border-color: rgba(255, 102, 120, .3);
            background: rgba(255, 102, 120, .08);
        }
        .ai-row--medium {
            border-color: rgba(241, 196, 15, .3);
            background: rgba(241, 196, 15, .08);
        }
        .ai-row--high {
            border-color: rgba(46, 204, 113, .3);
            background: rgba(46, 204, 113, .08);
        }
        .ai-label--missing { color: #8c9ebb; }
        .ai-label--low { color: #ff9aa8; }
        .ai-label--medium { color: #f1c40f; }
        .ai-label--high { color: #73e49d; }
        .ai-value {
            font-weight: 700;
            font-size: 14px;
        }
        .ai-value--low { color: #e74c3c; }
        .ai-value--medium { color: #f1c40f; }
        .ai-value--high { color: #2ecc71; }
        .review-inline-actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: auto;
            padding-top: 16px;
            border-top: 1px solid #2b3545;
        }
        .review-reason-label {
            display: grid;
            gap: 6px;
            color: var(--muted);
            font-size: 12px;
            font-weight: 650;
        }
        .review-reason-textarea {
            width: 100%;
            min-height: 48px;
            max-height: 90px;
            box-sizing: border-box;
            resize: vertical;
        }
        .review-inline-actions .row-actions {
            display: flex;
            gap: 8px;
        }
        .review-inline-actions .btn {
            flex: 1;
            min-height: 40px;
            font-size: 14px;
        }
        .risk-summary {
            padding: 10px 12px;
            border: 1px solid rgba(255, 102, 120, .45);
            border-radius: 6px;
            background: rgba(255, 102, 120, .10);
            color: #ff9aa8;
            line-height: 1.55;
        }
        .review-decision-bar {
            flex-shrink: 0;
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 12px;
            align-items: end;
            padding: 12px 16px;
            border-top: 1px solid var(--line);
            background: var(--panel-2);
        }
        .review-decision-bar label {
            display: grid;
            gap: 6px;
            color: var(--muted);
            font-size: 12px;
            font-weight: 650;
        }
        .review-decision-bar textarea.control {
            min-height: 48px;
            max-height: 90px;
        }
        .detail-images {
            display: flex;
            flex-direction: column;
            gap: 24px;
            min-height: 0;
        }
        .image-grid {
            display: grid;
            grid-template-columns: repeat(var(--image-columns, 3), minmax(0, 1fr));
            gap: 12px;
            min-height: 0;
        }
        .image-grid.is-single {
            grid-template-columns: minmax(0, min(640px, 100%));
            justify-content: center;
        }
        .image-grid.is-single .image-card {
            width: fit-content;
            max-width: 100%;
            justify-self: center;
        }
        .image-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #111721;
            padding: 16px;
            border-radius: 8px;
            border: 1px solid var(--line);
            flex-shrink: 0;
        }
        .image-section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            border-bottom: 1px solid var(--panel-2);
            padding-bottom: 8px;
        }
        .image-section h3 {
            margin: 0;
            color: var(--text);
            font-size: 13px;
            font-weight: 650;
        }
        .image-card {
            position: relative;
            width: 100%;
            height: clamp(140px, 20vh, 220px);
            border: 1px solid var(--line);
            border-radius: 4px;
            background: var(--panel-2);
            overflow: hidden;
        }
        .image-card .image-tile {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border: none;
            border-radius: 0;
            background: transparent;
        }
        .image-grid.is-single .image-tile {
            width: auto;
            max-width: 100%;
        }
        .image-card .copy-link-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(21, 24, 33, 0.85);
            border: 1px solid var(--line);
            border-radius: 4px;
            color: #d8e7fb;
            padding: 4px 8px;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s ease, border-color 0.2s ease, background-color 0.2s ease;
            display: flex;
            align-items: center;
            gap: 4px;
            z-index: 10;
        }
        .image-card:hover .copy-link-btn {
            opacity: 1;
        }
        .image-card .copy-link-btn:hover {
            border-color: var(--blue);
            background: rgba(32, 43, 58, 0.95);
            color: var(--text);
        }
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(29, 36, 48, 0.95);
            border: 1px solid var(--blue);
            color: var(--text);
            padding: 10px 20px;
            border-radius: 6px;
            z-index: 99999;
            font-weight: 500;
            box-shadow: var(--shadow-md);
            opacity: 0;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            pointer-events: none;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        .reason-box {
            margin: 0;
            padding: 14px;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
            display: grid;
            gap: 8px;
        }
        textarea.control {
            min-height: 86px;
            padding: 9px;
            resize: vertical;
        }
        .modal {
            position: fixed;
            inset: 0;
            z-index: 60;
            display: grid;
            place-items: center;
            padding: 24px;
            background: rgba(15, 23, 42, .72);
        }
        .modal-stage {
            position: relative;
            display: inline-grid;
            max-width: min(1180px, 96vw);
            max-height: 88vh;
        }
        .modal-close {
            position: absolute;
            top: -16px;
            right: -16px;
            z-index: 2;
            width: 44px;
            height: 44px;
            border: 1px solid rgba(255, 255, 255, .76);
            border-radius: 999px;
            background: #f5f8fc;
            color: #111721;
            font-size: 28px;
            line-height: 1;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 32px rgba(0, 0, 0, .38);
        }
        .modal-close:hover {
            border-color: #ffffff;
            background: #ffffff;
        }
        .modal img {
            max-width: min(1180px, 96vw);
            max-height: 88vh;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--panel);
        }
        .reason-modal-card {
            width: min(520px, 92vw);
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--panel);
            box-shadow: var(--shadow-md);
        }
        .reason-modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 14px 16px;
            border-bottom: 1px solid var(--line);
            background: var(--panel-2);
        }
        .reason-modal-header strong {
            font-size: 15px;
        }
        .reason-modal-body {
            display: grid;
            gap: 10px;
            padding: 16px;
        }
        .reason-preset-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .reason-preset-btn {
            min-height: 28px;
            padding: 4px 9px;
            border: 1px solid var(--line);
            border-radius: 999px;
            background: #111721;
            color: #d8e7fb;
            font-size: 12px;
            cursor: pointer;
        }
        .reason-preset-btn:hover {
            border-color: rgba(79, 156, 249, .55);
            background: rgba(79, 156, 249, .12);
        }
        .card-reason-presets {
            gap: 6px;
        }
        .card-reason-presets .reason-preset-btn {
            min-height: 24px;
            padding: 3px 7px;
        }
        .reason-modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            padding: 12px 16px 16px;
        }
        .reason-modal-error {
            min-height: 18px;
            color: var(--red);
            font-size: 12px;
        }
        .empty {
            padding: 48px 20px;
            text-align: center;
            color: var(--muted);
        }
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #151821;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.3s ease;
        }
        .loading-overlay.fade-out {
            opacity: 0;
            pointer-events: none;
        }
        .loading-circle-container {
            position: relative;
            width: 56px;
            height: 56px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .loading-spinner {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 3px solid rgba(79, 156, 249, 0.2);
            border-top: 3px solid var(--blue);
            border-radius: 50%;
            animation: loading-spin 0.8s linear infinite;
        }
        .loading-countdown {
            position: relative;
            color: var(--blue);
            font-size: 16px;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }
        .loading-text {
            color: var(--text);
            font-size: 15px;
            font-weight: 500;
        }
        .loading-progress-track {
            width: min(420px, 76vw);
            height: 8px;
            margin-top: 14px;
            border-radius: 999px;
            background: rgba(79, 156, 249, 0.18);
            overflow: hidden;
            border: 1px solid rgba(79, 156, 249, 0.26);
        }
        .loading-progress-bar {
            width: 0%;
            height: 100%;
            border-radius: inherit;
            background: var(--blue);
            transition: width 0.25s ease;
        }
        .loading-progress-detail {
            margin-top: 8px;
            color: var(--muted);
            font-size: 12px;
            font-variant-numeric: tabular-nums;
        }
        @keyframes loading-spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @media (max-width: 1279px) {
            .review-card-body {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
            .analysis-panel {
                grid-column: 1 / -1;
            }
            .hero-stage {
                min-height: 320px;
            }
        }
        @media (max-width: 920px) {
            .toolbar {
                grid-template-columns: 1fr;
            }
            .actions {
                justify-content: flex-start;
            }
            .filters {
                position: static;
                width: 100%;
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
            .field {
                grid-template-columns: 1fr;
                grid-column: auto;
                gap: 5px;
            }
            .summary {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
            .detail-images {
                grid-template-columns: 1fr;
            }
        }
        @media (max-width: 899px) {
            .review-card-header {
                align-items: flex-start;
                flex-direction: column;
            }
            .review-card-body {
                grid-template-columns: 1fr;
            }
            .analysis-panel {
                grid-column: auto;
            }
            .hero-stage {
                min-height: 260px;
            }
        }
        @media (max-width: 560px) {
            main, .toolbar {
                padding-left: 12px;
                padding-right: 12px;
            }
            .filters, .summary {
                grid-template-columns: 1fr;
            }
            h1 {
                font-size: 17px;
            }
        }
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                scroll-behavior: auto !important;
                transition: none !important;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>
    <div id="loading-overlay" class="loading-overlay">
        <div class="loading-circle-container">
            <div class="loading-spinner"></div>
            <div id="loading-countdown" class="loading-countdown"></div>
        </div>
        <div class="loading-text">正在极速加载与初始化数据，请稍候...</div>
    </div>
    <header class="toolbar">
        <div>
            <h1>明星同款舆情风险复审</h1>
            <div class="subtitle" id="source-label">数据源：未同步</div>
            <div class="subtitle sync-status-line" id="sync-status-line">后台同步：未启动 / 回写：无待处理</div>
        </div>
        <div class="actions">
            <button class="btn" id="btn-data-source-settings" type="button">数据源设置</button>
            <button class="btn" id="btn-sync-feishu" type="button">同步数据源</button>
            <input class="control" id="claim-count" type="number" min="1" max="500" value="20" style="width:80px">
            <button class="btn" id="btn-claim-task" type="button" data-default-text="领取任务">领取任务</button>
            <div class="excel-menu" id="excel-menu">
                <button class="btn" id="btn-excel-menu" type="button">Excel</button>
                <div class="excel-menu-panel" id="excel-menu-panel" hidden>
                    <label class="excel-menu-item" for="file-input">导入 Excel</label>
                    <button class="excel-menu-item" id="btn-export-xls" type="button">导出 Excel</button>
                </div>
            </div>
            <input id="file-input" type="file" accept=".xlsx,.xls,.csv,.tsv,.txt,.xml,.html,.htm,.ndjson,.json" hidden>
        </div>
    </header>

    <main>
        <div class="review-sticky">
            <section class="filters" aria-label="筛选项">
                <div class="field">
                    <label for="filter-category-lv1">一级类目</label>
                    <div class="filter-control select-filter-control">
                        <select class="control" id="filter-category-lv1"></select>
                        <button class="clear-filter select-clear-filter" type="button" data-clear-filter="filter-category-lv1" aria-label="清除一级类目">×</button>
                    </div>
                </div>
                <div class="field">
                    <label for="filter-category-lv2">二级类目</label>
                    <div class="filter-control select-filter-control">
                        <select class="control" id="filter-category-lv2"></select>
                        <button class="clear-filter select-clear-filter" type="button" data-clear-filter="filter-category-lv2" aria-label="清除二级类目">×</button>
                    </div>
                </div>
                <div class="field">
                    <label for="filter-category-lv3">三级类目</label>
                    <div class="filter-control select-filter-control">
                        <select class="control" id="filter-category-lv3"></select>
                        <button class="clear-filter select-clear-filter" type="button" data-clear-filter="filter-category-lv3" aria-label="清除三级类目">×</button>
                    </div>
                </div>
                <div class="field">
                    <label for="filter-ai-score-level">AI 评分级别</label>
                    <div class="filter-control select-filter-control">
                        <select class="control" id="filter-ai-score-level">
                            <option value="">全部</option>
                            <option value="high">高</option>
                            <option value="medium">中</option>
                            <option value="low">低</option>
                        </select>
                        <button class="clear-filter select-clear-filter" type="button" data-clear-filter="filter-ai-score-level" aria-label="清除 AI 评分级别">×</button>
                    </div>
                </div>
                <div class="field">
                    <label for="filter-management-lv1">一级管理类目</label>
                    <div class="filter-control select-filter-control">
                        <select class="control" id="filter-management-lv1"></select>
                        <button class="clear-filter select-clear-filter" type="button" data-clear-filter="filter-management-lv1" aria-label="清除一级管理类目">×</button>
                    </div>
                </div>
                <div class="field">
                    <label for="filter-management-lv2">二级管理类目</label>
                    <div class="filter-control select-filter-control">
                        <select class="control" id="filter-management-lv2"></select>
                        <button class="clear-filter select-clear-filter" type="button" data-clear-filter="filter-management-lv2" aria-label="清除二级管理类目">×</button>
                    </div>
                </div>
                <div class="field">
                    <label for="filter-management-lv3">三级管理类目</label>
                    <div class="filter-control select-filter-control">
                        <select class="control" id="filter-management-lv3"></select>
                        <button class="clear-filter select-clear-filter" type="button" data-clear-filter="filter-management-lv3" aria-label="清除三级管理类目">×</button>
                    </div>
                </div>
                <div class="field">
                    <label for="filter-review-status">是否通过</label>
                    <div class="filter-control select-filter-control">
                        <select class="control" id="filter-review-status">
                            <option value="">全部</option>
                            <option value="pending">未复审</option>
                            <option value="approved">通过</option>
                            <option value="rejected">不通过</option>
                        </select>
                        <button class="clear-filter select-clear-filter" type="button" data-clear-filter="filter-review-status" aria-label="清除是否通过">×</button>
                    </div>
                </div>
                <div class="field">
                    <label for="filter-brand-level">品牌等级</label>
                    <div class="filter-control select-filter-control">
                        <select class="control" id="filter-brand-level"></select>
                        <button class="clear-filter select-clear-filter" type="button" data-clear-filter="filter-brand-level" aria-label="清除品牌等级">×</button>
                    </div>
                </div>
                <div class="field">
                    <label for="filter-brand-name">商品品牌</label>
                    <div class="filter-control select-filter-control">
                        <select class="control" id="filter-brand-name"></select>
                        <button class="clear-filter select-clear-filter" type="button" data-clear-filter="filter-brand-name" aria-label="清除商品品牌">×</button>
                    </div>
                </div>
                <div class="field">
                    <label for="filter-handler-name">处理人</label>
                    <div class="filter-control select-filter-control">
                        <select class="control" id="filter-handler-name"></select>
                        <button class="clear-filter select-clear-filter" type="button" data-clear-filter="filter-handler-name" aria-label="清除处理人">×</button>
                    </div>
                </div>
                <div class="field field-search">
                    <label for="filter-query">搜索</label>
                    <div class="filter-control query-filter-control">
                        <input class="control" id="filter-query" type="text" placeholder="SPU / 明星 / 品牌 / 标题">
                        <button class="clear-filter query-clear-filter" type="button" data-clear-filter="filter-query" aria-label="清除关键词">×</button>
                    </div>
                </div>
            </section>

            <section class="summary" aria-label="复审进度">
                <div class="metric"><span>总量</span><strong id="metric-total">0</strong></div>
                <div class="metric"><span>通过</span><strong class="good" id="metric-approved">0</strong></div>
                <div class="metric"><span>不通过</span><strong class="bad" id="metric-rejected">0</strong></div>
                <div class="metric"><span>未复审</span><strong class="warn" id="metric-pending">0</strong></div>
                <div class="metric"><span>进度</span><strong id="metric-progress">0.0%</strong></div>
            </section>

            <div class="table-tools">
                <div id="page-info">0 条</div>
                <div class="pager" aria-label="分页">
                    <label for="page-size">每页</label>
                    <select class="control" id="page-size">
                        <option value="10" selected>10</option>
                        <option value="20">20</option>
                        <option value="50">50</option>
                        <option value="100">100</option>
                    </select>
                    <button class="btn" id="btn-prev-page" type="button">上一页</button>
                    <button class="btn" id="btn-next-page" type="button">下一页</button>
                </div>
            </div>
        </div>

        <section class="review-workbench" aria-label="大卡片复审工作台">
            <aside class="record-queue" aria-label="复审队列" style="background: transparent; border: none; box-shadow: none;">
                <div class="queue-list" id="review-table-body" style="padding: 0; overflow: visible; display: flex; flex-direction: column; gap: 24px;"></div>
                <div class="empty" id="empty-state">暂无数据，请导入生成的 NDJSON，或使用带内嵌数据的页面。</div>
            </aside>
        </section>
    </main>

    <div class="modal" id="data-source-settings-modal" hidden>
        <div class="reason-modal-card">
            <div class="reason-modal-header">
                <strong>数据源设置</strong>
                <button class="clear-filter" type="button" data-close-data-source-settings aria-label="关闭数据源设置">×</button>
            </div>
            <div class="reason-modal-body">
                <label class="review-reason-label" for="feishu-app-id">
                    App ID
                    <input class="control" id="feishu-app-id" placeholder="cli_xxx">
                </label>
                <label class="review-reason-label" for="feishu-app-secret">
                    App Secret
                    <input class="control" id="feishu-app-secret" type="password" placeholder="飞书应用 App Secret">
                </label>
                <label class="review-reason-label" for="feishu-url-input">
                    飞书链接
                    <input class="control" id="feishu-url-input" placeholder="粘贴飞书链接">
                </label>
                <label class="review-reason-label" for="handler-name-input">
                    处理人姓名
                    <input class="control" id="handler-name-input" placeholder="例如：张三">
                </label>
                <div class="inline-empty">使用应用身份直接访问表格；无需飞书登录。固定读取整张表；固定字段：处理人 / 审核状态 / 审核备注 / 审核时间。</div>
            </div>
            <div class="reason-modal-actions">
                <button class="btn" type="button" data-close-data-source-settings>取消</button>
                <button class="btn approve" type="button" data-save-data-source-settings>保存设置</button>
            </div>
        </div>
    </div>

    <div class="modal" id="image-preview-modal" hidden>
        <div class="modal-stage">
            <button class="modal-close" id="btn-close-image-preview" type="button" aria-label="关闭图片预览">×</button>
            <img id="preview-modal-img" alt="图片预览" draggable="false">
        </div>
    </div>

    <div class="modal" id="reject-reason-modal" hidden>
        <div class="reason-modal-card">
            <div class="reason-modal-header">
                <strong>填写不通过原因</strong>
                <button class="clear-filter" type="button" data-close-reject-reason aria-label="关闭不通过原因浮层">×</button>
            </div>
            <div class="reason-modal-body">
                <div class="reason-preset-list" id="reject-reason-presets" aria-label="常用不通过原因"></div>
                <textarea class="control" id="reject-reason-input" placeholder="请输入不通过原因"></textarea>
                <div class="reason-modal-error" id="reject-reason-error"></div>
            </div>
            <div class="reason-modal-actions">
                <button class="btn" type="button" data-close-reject-reason>取消</button>
                <button class="btn reject" type="button" data-submit-reject-reason>确认不通过</button>
            </div>
        </div>
    </div>
<script>
    (function () {
        'use strict';

        const STORAGE_KEY = 'starRiskReviewProgress:v1';
        const DATA_SOURCE_MODE_KEY = 'starRiskReviewDataSourceMode:v1';
        const PENDING_REVIEW_KEY = 'starRiskReviewPendingReviews:v1';
        const PENDING_CONFIRM_TTL = 24 * 60 * 60 * 1000;
        let records = [];
        let filteredRecords = null;
        let activeRecordKey = '';
        let pendingRejectKey = '';
        let currentPage = 0;

        function setDataSourceMode(mode) {
            localStorage.setItem(DATA_SOURCE_MODE_KEY, mode || 'feishu');
            updateTopSyncStatus();
        }

        function getDataSourceMode() {
            return localStorage.getItem(DATA_SOURCE_MODE_KEY) || 'feishu';
        }

        function isLocalFileMode() {
            return getDataSourceMode() === 'local';
        }

        function stopFeishuSilentSyncForLocalMode() {
            if (feishuSilentSyncTimer) {
                clearTimeout(feishuSilentSyncTimer);
                feishuSilentSyncTimer = null;
            }
            feishuSilentSyncRunning = false;
            feishuNextSilentSyncAt = 0;
            feishuLastSyncText = '线下模式';
            updateTopSyncStatus();
        }

        let precomputedFilterOptions = null;
        let categoryLv1Set = new Set();
        let categoryLv2Map = new Map();
        let allCategoryLv2Set = new Set();
        let managementLv1Set = new Set();
        let brandLevelSet = new Set();
        let recordMap = new Map();

        const FEISHU_CONFIG_KEY = 'starRiskReviewFeishuConfig:v1';
        const FEISHU_FIXED_FIELDS = {
            handler: '处理人',
            status: '审核状态',
            reason: '审核备注',
            time: '审核时间',
        };

        function readFeishuConfig() {
            try {
                return JSON.parse(localStorage.getItem(FEISHU_CONFIG_KEY) || '{}');
            } catch (error) {
                return {};
            }
        }

        function writeFeishuConfig(patch) {
            const config = Object.assign({}, readFeishuConfig(), patch || {});
            localStorage.setItem(FEISHU_CONFIG_KEY, JSON.stringify(config));
            updateFeishuSourceLabel();
            return config;
        }

function updateFeishuSourceLabel(extra) {
            const config = readFeishuConfig();
            const parts = [];
            parts.push((config.appId && config.appSecret) ? '应用身份已配置' : '应用身份未配置');
            if (config.handlerName) parts.push(`处理人：${config.handlerName}`);
            if (extra) parts.push(extra);
            const sourceLabel = document.getElementById('source-label');
            if (sourceLabel && sourceLabel.textContent.indexOf('数据源：') === 0) {
                sourceLabel.textContent = '数据源：' + parts.join(' / ');
            }
        }

function openDataSourceSettings() {
            const config = readFeishuConfig();
            const appId = document.getElementById('feishu-app-id');
            const appSecret = document.getElementById('feishu-app-secret');
            const url = document.getElementById('feishu-url-input');
            const handler = document.getElementById('handler-name-input');
            const count = document.getElementById('claim-count');
            if (appId) appId.value = config.appId || '';
            if (appSecret) appSecret.value = config.appSecret || '';
            if (url) url.value = config.feishuUrl || '';
            if (handler) handler.value = config.handlerName || '';
            if (count) count.value = config.claimCount || 20;
            const modal = document.getElementById('data-source-settings-modal');
            if (modal) modal.hidden = false;
        }

        function closeDataSourceSettings() {
            const modal = document.getElementById('data-source-settings-modal');
            if (modal) modal.hidden = true;
        }

        function saveDataSourceSettings() {
            const oldConfig = readFeishuConfig();
            const appId = document.getElementById('feishu-app-id');
            const appSecret = document.getElementById('feishu-app-secret');
            const url = document.getElementById('feishu-url-input');
            const handler = document.getElementById('handler-name-input');
            const count = document.getElementById('claim-count');

            const appIdValue = appId ? appId.value.trim() : '';
            const appSecretValue = appSecret ? appSecret.value.trim() : '';
            const urlValue = url ? url.value.trim() : '';
            const handlerValue = handler ? handler.value.trim() : '';

            const config = writeFeishuConfig({
                appId: appIdValue || oldConfig.appId || '',
                appSecret: appSecretValue || oldConfig.appSecret || '',
                feishuUrl: urlValue || oldConfig.feishuUrl || '',
                handlerName: handlerValue || oldConfig.handlerName || '',
                claimCount: count ? count.value.trim() || oldConfig.claimCount || '20' : (oldConfig.claimCount || '20'),
            });

            if (appId && config.appId) appId.value = config.appId;
            if (appSecret && config.appSecret) appSecret.value = config.appSecret;
            if (url && config.feishuUrl) url.value = config.feishuUrl;
            if (handler && config.handlerName) handler.value = config.handlerName;
            return config;
        }

        function handlerMatches(value, handlerName) {
            const handler = String(handlerName || '').trim();
            if (!handler) return true;
            const text = String(value || '').trim();
            if (!text) return true;
            return text.split(/[，,、\n\r\s]+/).filter(Boolean).includes(handler);
        }

        let feishuApiChain = Promise.resolve();

        function isRateLimitError(response, data) {
            const msg = String((data && (data.message || data.msg)) || '');
            return response.status === 429 || /too many|rate|频繁|请求过多|TooMany/i.test(msg);
        }

        async function feishuFetchWithRetry(action, payload) {
            const config = readFeishuConfig();

            for (let attempt = 1; attempt <= 4; attempt++) {
                const response = await fetch('/api/feishu-proxy', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(Object.assign({ action, config }, payload || {})),
                });
                const text = await response.text();
                let data;
                try {
                    data = JSON.parse(text);
                } catch (error) {
                    throw new Error('接口返回不是 JSON，请检查 Cloudflare Functions 是否部署成功');
                }

                if (response.ok && data.ok !== false) return data;

                if (attempt < 4 && isRateLimitError(response, data)) {
                    updateTopSyncStatus(`请求过多，${attempt * 1.2}s 后重试`);
                    await sleep(1200 * attempt);
                    continue;
                }

                throw new Error(data.message || data.msg || `请求失败 ${response.status}`);
            }
        }

        async function feishuSheetApi(action, payload) {
            const task = () => feishuFetchWithRetry(action, payload);
            const run = feishuApiChain.then(task, task);
            feishuApiChain = run.catch(() => {});
            return run;
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function withTimeout(promise, ms, message) {
            let timer = null;
            const timeout = new Promise((_, reject) => {
                timer = setTimeout(() => reject(new Error(message || '请求超时')), ms);
            });
            return Promise.race([promise, timeout]).finally(() => {
                if (timer) clearTimeout(timer);
            });
        }

        const FEISHU_SYNC_PAGE_SIZE = 4000;
        const FEISHU_SILENT_SYNC_INTERVAL = 60000;
        const FEISHU_WRITEBACK_INTERVAL = 1500;
        let feishuSilentSyncTimer = null;
        let feishuSilentSyncRunning = false;
        let feishuLastSilentSyncStartedAt = 0;
        let feishuSilentSyncBackoff = 0;
        let feishuNextSilentSyncAt = 0;
        let feishuLastSyncText = '未同步';
        let reviewWriteTimer = null;
        let reviewWriteDebounceTimer = null;
        let reviewWriteQueue = new Map();
        let pendingReviewRows = loadPendingReviewRows();
        let activeWriteRows = new Map();
        let reviewWriteRunning = false;
        let reviewLastWriteText = '无待处理';

        function formatClockTime(ts) {
            if (!ts) return '无';
            try {
                return new Date(ts).toLocaleTimeString('zh-CN', { hour12: false });
            } catch (error) {
                return '无';
            }
        }

        function updateTopSyncStatus(extra) {
            const line = document.getElementById('sync-status-line');
            if (!line) return;
            const queueSize = reviewWriteQueue ? reviewWriteQueue.size : 0;
            const pendingConfirmSize = pendingReviewRows ? pendingReviewRows.size : 0;
            const writeText = reviewWriteRunning
                ? '回写中'
                : (queueSize ? `待回写 ${queueSize} 条` : (pendingConfirmSize ? `待远端确认 ${pendingConfirmSize} 条` : reviewLastWriteText));

            if (isLocalFileMode()) {
                line.textContent = `线下模式：本地复审进度实时保存 / ${writeText}${extra ? ' / ' + extra : ''}`;
                return;
            }

            const now = Date.now();
            const remain = feishuNextSilentSyncAt ? Math.max(0, Math.ceil((feishuNextSilentSyncAt - now) / 1000)) : 0;
            const syncText = feishuSilentSyncRunning ? '同步中' : feishuLastSyncText;
            const nextText = feishuNextSilentSyncAt ? (remain > 0 ? `${remain}s 后` : (feishuSilentSyncRunning ? '执行中' : '即将执行')) : '未启动';
            line.textContent = `后台动态同步：${syncText} / 周期 ${Math.round(FEISHU_SILENT_SYNC_INTERVAL / 1000)}s / 下次 ${nextText} / ${writeText}${extra ? ' / ' + extra : ''}`;
        }

        function startTopStatusTicker() {
            updateTopSyncStatus();
            setInterval(updateTopSyncStatus, 1000);
        }

        function getReviewRowKey(rowIndex) {
            const row = Number(rowIndex || 0);
            return Number.isFinite(row) && row > 0 ? String(row) : '';
        }

        function loadPendingReviewRows() {
            try {
                const raw = JSON.parse(localStorage.getItem(PENDING_REVIEW_KEY) || '{}');
                const entries = Array.isArray(raw) ? raw : Object.values(raw || {});
                const map = new Map();
                const now = Date.now();
                entries.forEach(item => {
                    const key = getReviewRowKey(item && item.remoteRowIndex);
                    if (!key) return;
                    const localEditAt = Number(item.localEditAt || 0);
                    const writeConfirmedAt = Number(item.writeConfirmedAt || 0);
                    const latestTs = Math.max(localEditAt, writeConfirmedAt);
                    if (latestTs && now - latestTs > PENDING_CONFIRM_TTL) return;
                    map.set(key, item);
                });
                return map;
            } catch (error) {
                console.warn('读取待回写保护队列失败，已重置', error);
                return new Map();
            }
        }

        function persistPendingReviewRows() {
            const obj = {};
            pendingReviewRows.forEach((item, key) => {
                if (key && item) obj[key] = item;
            });
            localStorage.setItem(PENDING_REVIEW_KEY, JSON.stringify(obj));
        }

        function markPendingReview(item) {
            const key = getReviewRowKey(item && item.remoteRowIndex);
            if (!key) return null;
            const payload = Object.assign({}, item, {
                remoteRowIndex: Number(item.remoteRowIndex),
                localEditAt: Number(item.localEditAt || Date.now())
            });
            pendingReviewRows.set(key, payload);
            persistPendingReviewRows();
            return payload;
        }

        function getPendingReview(rowIndex) {
            const key = getReviewRowKey(rowIndex);
            return key ? pendingReviewRows.get(key) : null;
        }

        function getProtectedReview(rowIndex) {
            const key = getReviewRowKey(rowIndex);
            if (!key) return null;
            return pendingReviewRows.get(key) || activeWriteRows.get(key) || reviewWriteQueue.get(key) || null;
        }

        function remoteRowMatchesPending(row, pending) {
            if (!row || !pending) return false;
            const remoteStatus = normalizeStatus(row['审核状态'] || row['复审结果'] || row['是否通过'] || '');
            const remoteReason = String(row['审核备注'] || row['不通过原因'] || '').trim();
            const remoteTime = String(row['审核时间'] || row['复审时间'] || '').trim();
            const pendingStatus = normalizeStatus(pending.reviewStatus || '');
            const pendingReason = String(pending.reviewReason || '').trim();
            const pendingTime = String(pending.reviewTime || '').trim();

            if (remoteStatus !== pendingStatus) return false;
            if (remoteReason !== pendingReason) return false;

            // 飞书/Excel 有时会把时间格式改写，状态+原因一致即可认为远端已经追上。
            if (!pendingTime || !remoteTime) return true;
            return remoteTime === pendingTime || remoteTime.startsWith(pendingTime) || pendingTime.startsWith(remoteTime);
        }

        function markWriteConfirmed(item) {
            const key = getReviewRowKey(item && item.remoteRowIndex);
            if (!key) return;
            const current = pendingReviewRows.get(key) || item;
            const next = Object.assign({}, current, {
                remoteRowIndex: Number(current.remoteRowIndex || item.remoteRowIndex),
                writeConfirmedAt: Date.now()
            });
            pendingReviewRows.set(key, next);
            reviewWriteQueue.delete(key);
            activeWriteRows.delete(key);
            persistPendingReviewRows();
        }

        function clearPendingReview(item) {
            const key = getReviewRowKey(item && item.remoteRowIndex);
            if (!key) return;
            const current = pendingReviewRows.get(key);
            if (!current || !item.localEditAt || Number(current.localEditAt || 0) === Number(item.localEditAt || 0)) {
                pendingReviewRows.delete(key);
                reviewWriteQueue.delete(key);
                persistPendingReviewRows();
            }
            activeWriteRows.delete(key);
        }

        function applyReviewPayloadToRecord(record, payload) {
            if (!record || !payload) return false;
            let changed = false;
            const nextHandler = String(payload.handlerName || '').trim();
            const nextStatus = normalizeStatus(payload.reviewStatus || '');
            const nextReason = String(payload.reviewReason || '').trim();
            const nextTime = String(payload.reviewTime || '').trim();

            if (nextHandler && (record.handlerName || '') !== nextHandler) {
                record.handlerName = nextHandler;
                changed = true;
            }
            if ((record.reviewStatus || '') !== nextStatus) {
                record.reviewStatus = nextStatus;
                changed = true;
            }
            if ((record.reviewReason || '') !== nextReason) {
                record.reviewReason = nextReason;
                changed = true;
            }
            if (nextTime && (record.reviewTime || '') !== nextTime) {
                record.reviewTime = nextTime;
                changed = true;
            }

            if (record.raw) {
                if (nextHandler) record.raw['处理人'] = nextHandler;
                record.raw['审核状态'] = nextStatus === 'approved' ? '通过' : nextStatus === 'rejected' ? '不通过' : '';
                record.raw['审核备注'] = nextReason;
                if (nextTime) record.raw['审核时间'] = nextTime;
            }
            return changed;
        }

        function applyPendingReviewOverlay(targetRecords = records) {
            if (!pendingReviewRows || !pendingReviewRows.size || !targetRecords || !targetRecords.length) return 0;
            let changed = 0;
            targetRecords.forEach(record => {
                const row = getRemoteRowIndex(record);
                const pending = getPendingReview(row);
                if (pending && applyReviewPayloadToRecord(record, pending)) changed += 1;
            });
            return changed;
        }

        function compactReviewRecord(record) {
            const rowIndex = getRemoteRowIndex(record);
            return {
                remoteRowIndex: rowIndex,
                reviewStatus: record.reviewStatus || '',
                reviewReason: record.reviewReason || '',
                reviewTime: record.reviewTime || '',
                handlerName: record.handlerName || (record.raw && record.raw[FEISHU_FIXED_FIELDS.handler]) || '',
                localEditAt: Number(record.localEditAt || Date.now())
            };
        }

        function ensureReviewWriteTimer() {
            if (reviewWriteTimer) return;
            reviewWriteTimer = setInterval(() => flushReviewWriteQueue(false), FEISHU_WRITEBACK_INTERVAL);
        }

        function scheduleReviewWriteSoon() {
            ensureReviewWriteTimer();
            if (reviewWriteDebounceTimer) clearTimeout(reviewWriteDebounceTimer);
            reviewWriteDebounceTimer = setTimeout(() => flushReviewWriteQueue(false), 700);
        }

        async function flushReviewWriteQueue(force) {
            if (reviewWriteRunning) return;
            if (!reviewWriteQueue || !reviewWriteQueue.size) {
                reviewLastWriteText = pendingReviewRows && pendingReviewRows.size ? `待远端确认 ${pendingReviewRows.size} 条` : '无待处理';
                updateTopSyncStatus();
                return;
            }

            const batch = Array.from(reviewWriteQueue.values());
            reviewWriteQueue.clear();
            batch.forEach(item => {
                const key = getReviewRowKey(item && item.remoteRowIndex);
                if (key) activeWriteRows.set(key, item);
            });

            reviewWriteRunning = true;
            reviewLastWriteText = `回写中 ${batch.length} 条`;
            updateTopSyncStatus();

            try {
                const data = await feishuSheetApi('batchUpdateReviews', { records: batch });

                // 关键：写接口返回成功不代表下一轮读接口马上能读到新值。
                // 所以这里只标记“写回已提交，等待远端确认”，不清除本地保护。
                batch.forEach(markWriteConfirmed);

                reviewLastWriteText = `已提交 ${data.count || batch.length} 条，待远端确认 ${pendingReviewRows.size} 条`;
            } catch (error) {
                batch.forEach(item => {
                    const key = getReviewRowKey(item && item.remoteRowIndex);
                    if (!key) return;
                    activeWriteRows.delete(key);
                    const latest = pendingReviewRows.get(key) || item;
                    reviewWriteQueue.set(key, latest);
                });
                reviewLastWriteText = `回写失败，保留本地 ${pendingReviewRows.size} 条`;
                console.error('周期回写失败', error);
                if (force) alert('回写飞书失败：\n' + error.message);
            } finally {
                batch.forEach(item => {
                    const key = getReviewRowKey(item && item.remoteRowIndex);
                    if (key) activeWriteRows.delete(key);
                });
                reviewWriteRunning = false;
                updateTopSyncStatus();
            }
        }

        function setClaimProgress(text, state) {
            const btn = document.getElementById('btn-claim-task');
            if (!btn) return;
            btn.textContent = text || (btn.dataset.defaultText || '领取任务');
            btn.classList.remove('claiming', 'done', 'error');
            if (state === 'active') btn.classList.add('claiming');
            if (state === 'done') btn.classList.add('done');
            if (state === 'error') btn.classList.add('error');
        }

        function calcSyncPercent(start, scanned, totalRows, batch) {
            const total = Number(totalRows || 0);
            if (total > 1) {
                const doneRows = Math.max(0, Number(start || 2) - 2 + Number(scanned || 0));
                return Math.max(1, Math.min(99, Math.floor(doneRows / Math.max(1, total - 1) * 100)));
            }
            return Math.min(95, 8 + batch * 12);
        }

        async function readFeishuAllPages(showProgress, options = {}) {
            const rows = [];
            let start = 2;
            let pageSize = FEISHU_SYNC_PAGE_SIZE;
            let batch = 0;
            let emptyBlocks = 0;
            let totalRows = 0;
            let firstPaintDone = false;

            while (true) {
                const useOverlay = showProgress && !(options.stream && firstPaintDone);
                if (useOverlay) {
                    const p = calcSyncPercent(start, 0, totalRows, batch);
                    showLoading(`正在同步基础数据：第 ${batch + 1} 批`, `${p}% · 已读取 ${rows.length} 行 · 每批约 ${pageSize} 行`);
                } else if (options.stream) {
                    feishuLastSyncText = `基础数据流加载中，已读 ${rows.length} 行`;
                    updateTopSyncStatus();
                }

                const data = await feishuSheetApi('getPage', { start, pageSize });
                const pageRows = data.rows || [];
                totalRows = Number(data.totalRows || totalRows || 0);

                if (pageRows.length) {
                    rows.push(...pageRows);
                    emptyBlocks = 0;

                    if (options.stream) {
                        setRecords(pageRows, true);
                        const totalText = totalRows ? ` / 预计 ${Math.max(0, totalRows - 1)} 行` : '';
                        setText('source-label', `数据源：飞书 / 流式加载中 / 已读取 ${rows.length}${totalText} 条`);
                        feishuLastSyncText = `流式加载 ${rows.length}${totalText} 条`;
                        updateTopSyncStatus();

                        if (!firstPaintDone) {
                            firstPaintDone = true;
                            hideLoading();
                        }
                    }
                } else {
                    emptyBlocks++;
                }

                batch += 1;
                const scanned = Number(data.scanned || pageRows.length || 0);
                const percent = data.done ? 100 : calcSyncPercent(start, scanned, totalRows, batch);

                if (useOverlay && !firstPaintDone) {
                    const totalText = totalRows ? ` / 预计 ${Math.max(0, totalRows - 1)} 行` : '';
                    showLoading(`正在同步基础数据：已读取 ${rows.length}${totalText}`, `${percent}% · 第 ${batch} 批完成`);
                } else if (options.stream) {
                    const totalText = totalRows ? ` / 预计 ${Math.max(0, totalRows - 1)} 行` : '';
                    feishuLastSyncText = data.done ? `基础数据加载完成 ${rows.length} 条 ${formatClockTime(Date.now())}` : `基础数据继续加载 ${rows.length}${totalText} 条`;
                    updateTopSyncStatus();
                }

                if (data.done || emptyBlocks >= 2) break;

                start = Number(data.nextStart || (start + (data.pageSize || pageSize)));
                pageSize = Number(data.pageSize || pageSize);
                await sleep(5);
            }

            return rows;
        }

        async function readFeishuDynamicPages(showStatus) {
            const rows = [];
            let start = 2;
            let pageSize = FEISHU_SYNC_PAGE_SIZE;
            let batch = 0;
            let totalRows = 0;

            while (true) {
                if (showStatus) {
                    feishuLastSyncText = `动态同步中，已扫 ${Math.max(0, start - 2)} 行`;
                    updateTopSyncStatus();
                }

                const data = await feishuSheetApi('getDynamicPage', { start, pageSize });
                const pageRows = data.rows || [];
                totalRows = Number(data.totalRows || totalRows || 0);
                if (pageRows.length) rows.push(...pageRows);

                batch += 1;
                if (data.done) break;

                start = Number(data.nextStart || (start + (data.pageSize || pageSize)));
                pageSize = Number(data.pageSize || pageSize);
                if (batch > 100) break;
                await sleep(10);
            }

            return { rows, totalRows };
        }

        function applyDynamicRows(dynamicRows) {
            if (!dynamicRows || !dynamicRows.length || !records.length) return 0;

            const map = new Map();
            records.forEach(record => {
                const row = getRemoteRowIndex(record);
                if (row) map.set(Number(row), record);
            });

            let changed = 0;
            let protectedCount = 0;
            let confirmedCount = 0;

            dynamicRows.forEach(row => {
                const remoteRow = Number(row.__rowIndex || 0);
                const record = map.get(remoteRow);
                if (!record) return;

                const protectedReview = getProtectedReview(remoteRow);
                if (protectedReview) {
                    if (remoteRowMatchesPending(row, protectedReview)) {
                        clearPendingReview(protectedReview);
                        confirmedCount += 1;
                        // 远端已经追上，继续把远端规范值落到本地。
                    } else {
                        if (applyReviewPayloadToRecord(record, protectedReview)) changed += 1;
                        protectedCount += 1;
                        return;
                    }
                }

                const nextHandler = String(row['处理人'] || '').trim();
                const nextStatus = normalizeStatus(row['审核状态'] || row['复审结果'] || row['是否通过'] || '');
                const nextReason = String(row['审核备注'] || row['不通过原因'] || '').trim();
                const nextTime = String(row['审核时间'] || row['复审时间'] || '').trim();

                let rowChanged = false;
                if ((record.handlerName || '') !== nextHandler) {
                    record.handlerName = nextHandler;
                    rowChanged = true;
                }
                if ((record.reviewStatus || '') !== nextStatus) {
                    record.reviewStatus = nextStatus;
                    rowChanged = true;
                }
                if ((record.reviewReason || '') !== nextReason) {
                    record.reviewReason = nextReason;
                    rowChanged = true;
                }
                if (nextTime && (record.reviewTime || '') !== nextTime) {
                    record.reviewTime = nextTime;
                    rowChanged = true;
                }

                if (record.raw) {
                    record.raw['处理人'] = nextHandler;
                    record.raw['审核状态'] = nextStatus === 'approved' ? '通过' : nextStatus === 'rejected' ? '不通过' : '';
                    record.raw['审核备注'] = nextReason;
                    if (nextTime) record.raw['审核时间'] = nextTime;
                }

                if (rowChanged) changed += 1;
