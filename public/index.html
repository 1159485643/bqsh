<!DOCTYPE html>
<html lang="zh">
<head><meta charset="UTF-8"><title>V3飞书系统</title></head>
<body>
<h2>飞书审核系统V3</h2>

AppID <input id="appId"><br>
AppSecret <input id="appSecret"><br>
处理人 <input id="user"><br>
飞书链接 <input id="url" style="width:400px"><br>

<button onclick="connect()">加载</button>

<div id="list"></div>

<script>
let state={user:"",list:[]};

async function connect(){
 state.user=document.getElementById("user").value;

 const res=await fetch("/api/feishu",{method:"POST",
 headers:{"Content-Type":"application/json"},
 body:JSON.stringify({
 appId:appId.value,
 appSecret:appSecret.value,
 url:url.value,
 action:"get"
 })});

 const d=await res.json();
 state.list=d.list||[];
 render();
}

function render(){
 const el=document.getElementById("list");
 el.innerHTML="";
 state.list.forEach((x,i)=>{
 const div=document.createElement("div");
 div.innerHTML=`
 <b>${x.title||""}</b><br>
 状态:${x.status||"待审核"}<br>
 处理人:${x.user||""}<br>
 <button onclick="claim(${i})">领取</button>
 <button onclick="pass(${i})">通过</button>
 `;
 el.appendChild(div);
 });
}

function claim(i){
 state.list[i].user=state.user;
}

function pass(i){
 state.list[i].status="通过";
}
</script>
</body>
</html>
